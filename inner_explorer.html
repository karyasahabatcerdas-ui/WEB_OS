<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #007bff; --border: #eee; --bg-side: #f8f9fa; --text: #333; }
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; overflow: hidden; color: var(--text); }
        
        /* SIDEBAR (TREE VIEW) */
        #side-pane { width: 260px; border-right: 1px solid #ddd; background: var(--bg-side); padding: 10px; overflow-y: auto; flex-shrink: 0; }
        .tree-node { display: flex; flex-direction: column; margin-left: 12px; }
        .tree-row { display: flex; align-items: center; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; gap: 6px; white-space: nowrap; transition: 0.1s; }
        .tree-row:hover { background: rgba(0,123,255,0.1); }
        .tree-row.active { background: var(--accent); color: white; font-weight: bold; }
        .expander { width: 14px; text-align: center; font-size: 10px; cursor: pointer; transition: transform 0.2s; }
        .expander.open { transform: rotate(90deg); }
        .sub-tree { display: none; border-left: 1px solid #ddd; margin-left: 6px; }
        .sub-tree.show { display: block; }

        /* MAIN CONTENT (DETAILS VIEW) */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .address-bar { padding: 10px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; background: #fff; align-items: center; }
        #path-input { flex: 1; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; outline: none; background: #fdfdfd; }
        
        .list-header, .file-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr; padding: 10px 15px; font-size: 13px; align-items: center; border-bottom: 1px solid #f5f5f5; }
        .list-header { font-weight: bold; background: #fafafa; position: sticky; top: 0; z-index: 5; color: #666; }
        .file-row:hover { background: #f0f7ff; cursor: pointer; }
        .file-row i { font-size: 16px; margin-right: 10px; color: #f39c12; }
        
        /* CONTEXT MENUS */
        .ctx-menu { position: fixed; background: white; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); display: none; z-index: 1000; min-width: 150px; border-radius: 5px; padding: 5px 0; }
        .ctx-menu div { padding: 8px 15px; font-size: 13px; cursor: pointer; }
        .ctx-menu div:hover { background: var(--accent); color: white; }
        
        #drop-zone { position: fixed; inset: 0; background: rgba(0,123,255,0.1); border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center; z-index: 100; pointer-events: none; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div id="side-pane">
        <div style="font-weight:bold; font-size:11px; color:#888; margin-bottom:10px;">DRIVES & FOLDERS</div>
        <div id="root-anchor" class="tree-node" style="margin-left:0;">
            <!-- Tree Root akan di-render di sini -->
        </div>
    </div>

    <div id="main-container">
        <div class="address-bar">
            <button onclick="loadData(lastParentId)" style="border:1px solid #ddd; background:none; cursor:pointer; border-radius:4px;">⬅️</button>
            <input type="text" id="path-input" placeholder="Search files..." onkeyup="filterFiles()">
        </div>
        <div class="list-header"><div>Name</div><div>Type</div><div>Size</div></div>
        <div id="file-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="drop-zone">Drop to Upload</div>

    <div id="ctx-item" class="ctx-menu">
        <div onclick="renameItem()">Rename</div>
        <div onclick="deleteItem()" style="color:red">Delete</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwV0tHF6L4tT2ZERSSCKJ9C6KrtoS9WnNmPIypkAsijju9UbJTYsJPAzA-fCgl5nuaO/exec"; // GANTI DENGAN URL GAS KAMU
        const params = new URLSearchParams(window.location.search);
        let activeFolderId = params.get('folderId') || ""; 
        let lastParentId = ""; 
        let loadedNodes = {}; 

        // 1. INITIALIZE OS EXPLORER
        async function init() {
            const rootId = activeFolderId || "ID_FOLDER_ROOT_KAMU"; // GANTI JUGA DI SINI
            const anchor = document.getElementById('root-anchor');
            
            // Build Home Root Node
            anchor.innerHTML = createTreeNode(rootId, "Home Root", true);
            await toggleFolder(rootId, "Home Root", anchor.querySelector('.tree-row'));
        }

        // 2. TREE LOGIC (RECURSIVE)
        function createTreeNode(id, name, isRoot = false) {
            return `
                <div class="tree-node" id="node-${id}">
                    <div class="tree-row" onclick="toggleFolder('${id}', '${name}', this)">
                        <span class="expander">▶</span>
                        <i class="fas ${isRoot ? 'fa-home' : 'fa-folder'}"></i>
                        <span>${name}</span>
                    </div>
                    <div class="sub-tree" id="sub-${id}"></div>
                </div>`;
        }

        async function toggleFolder(id, name, element) {
            const subTree = document.getElementById(`sub-${id}`);
            const expander = element.querySelector('.expander');

            // Set Active State
            document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
            element.classList.add('active');
            activeFolderId = id;

            // Fetch data jika belum pernah diload
            if (!loadedNodes[id]) {
                expander.innerHTML = "⌛";
                const res = await fetch(`${GAS_URL}?action=GET_TREE&folderId=${id}`);
                const data = await res.json();
                
                // Render sub-folders di tree (kiri)
                subTree.innerHTML = data.folders.map(f => createTreeNode(f.id, f.name)).join('');
                loadedNodes[id] = true;
                
                // Render isi di main pane (kanan)
                renderMainContent(data);
            } else {
                // Jika sudah ada, tinggal refresh tampilan kanan saja
                const res = await fetch(`${GAS_URL}?action=GET_TREE&folderId=${id}`);
                const data = await res.json();
                renderMainContent(data);
            }

            // Toggle Expand/Collapse
            const isOpening = !subTree.classList.contains('show');
            subTree.classList.toggle('show', isOpening);
            expander.classList.toggle('open', isOpening);
            expander.innerHTML = "▶";

            document.getElementById('path-input').value = `Root / ${name}`;
        }

        // 3. MAIN CONTENT LOGIC (DETAILS)
        function renderMainContent(data) {
            const list = document.getElementById('file-list');
            list.innerHTML = "";

            data.folders.forEach(f => {
                list.innerHTML += `
                    <div class="file-row" onclick="syncAndOpen('${f.id}', '${f.name}')">
                        <div><i class="fas fa-folder"></i> ${f.name}</div>
                        <div style="color:#999">Folder</div>
                        <div style="color:#999">--</div>
                    </div>`;
            });

            data.files.forEach(f => {
                const ext = f.name.split('.').pop().toUpperCase();
                list.innerHTML += `
                    <div class="file-row" ondblclick="parent.handleFileOpen(${JSON.stringify(f)})" oncontextmenu="showCtx(event, '${f.id}', '${f.name}')">
                        <div><i class="fas fa-file-alt" style="color:#999"></i> ${f.name}</div>
                        <div style="color:#999">${ext} File</div>
                        <div style="color:#999">N/A</div>
                    </div>`;
            });
        }

        // Sinkronisasi: Klik di kanan akan menggerakkan tree di kiri
        async function syncAndOpen(id, name) {
            const rowElement = document.querySelector(`#node-${id} .tree-row`);
            if (rowElement) {
                toggleFolder(id, name, rowElement);
            } else {
                // Jika node belum ada di tree, buka manual
                window.location.href = `inner_explorer.html?folderId=${id}&pName=${name}`;
            }
        }

        function filterFiles() {
            const val = document.getElementById('path-input').value.split('/').pop().toLowerCase();
            document.querySelectorAll('.file-row').forEach(row => {
                const name = row.children[0].innerText.toLowerCase();
                row.style.display = name.includes(val) ? 'grid' : 'none';
            });
        }

        // Context Menu & Global Listeners
        function showCtx(e, id, name) {
            e.preventDefault(); e.stopPropagation();
            const menu = document.getElementById('ctx-item');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
        }
        window.onclick = () => document.querySelectorAll('.ctx-menu').forEach(m => m.style.display = 'none');

        init();
    </script>
</body>
</html>
