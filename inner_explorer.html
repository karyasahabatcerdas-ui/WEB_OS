<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        /* Layout Two-Pane */
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; overflow: hidden; }
        
        /* Panel Kiri: Navigasi Folder */
        #side-pane { width: 200px; border-right: 1px solid #eee; background: #f9f9f9; padding: 10px; overflow-y: auto; flex-shrink: 0; }
        .side-item { padding: 8px; cursor: pointer; border-radius: 5px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .side-item:hover { background: #e0e0e0; }
        .side-item.active { background: #007bff; color: white; }

        /* Panel Kanan: Konten Utama */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 8px; border-bottom: 1px solid #eee; display: flex; gap: 8px; background: #fdfdfd; }
        .toolbar button { padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 4px; }
        
        .explorer-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; padding: 15px; overflow-y: auto; }
        
        /* Item Style */
        .item { text-align: center; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; border: 1px solid transparent; }
        .item:hover { background: #f0f7ff; border: 1px solid #cce5ff; }
        .item img { width: 45px; height: 45px; margin-bottom: 5px; pointer-events: none; }
        .item-name { font-size: 11px; word-break: break-all; 
                    display: -webkit-box; -webkit-line-clamp: 2; 
                    line-clamp: 2; /* Tambahkan baris ini untuk standar */
                    -webkit-box-orient: vertical; overflow: hidden; }

        /* Overlay & Menu */
        #drop-zone { position: fixed; inset: 0; background: rgba(0,123,255,0.15); border: 2px dashed #007bff; display: none; align-items: center; justify-content: center; z-index: 10; font-weight: bold; color: #007bff; pointer-events: none; }
        #ctx-menu { position: fixed; background: white; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); display: none; z-index: 100; min-width: 120px; }
        #ctx-menu div { padding: 8px 15px; font-size: 13px; cursor: pointer; }
        #ctx-menu div:hover { background: #007bff; color: white; }
    </style>
</head>
<body>

    <!-- PANEL KIRI -->
    <div id="side-pane">
        <div style="font-weight: bold; font-size: 12px; margin-bottom: 10px; color: #888;">FOLDERS</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-weight:bold; font-size:12px; color:#888;">DRIVES & FOLDERS</span>
            <button onclick="promptAddRoot()" style="font-size:10px; cursor:pointer; border:none; background:none; color:var(--accent);">+ Add</button>
        </div>
        <div id="folder-list-side"></div>
    </div>

    <!-- PANEL KANAN -->
    <div id="main-container">
        <div class="toolbar">
            <button onclick="window.history.back()">⬅️</button>
            <button onclick="loadData()">🔄 Refresh</button>
            <div id="status" style="font-size: 10px; align-self: center; color: #888;">Ready</div>
        </div>

        <div id="file-list" class="explorer-grid">
            <!-- Data muncul di sini -->
        </div>
    </div>

    <div id="drop-zone">Lepaskan file untuk Upload</div>

    <div id="ctx-menu">
        <div onclick="renameItem()">Rename</div>
        <div onclick="deleteItem()" style="color: red;">Delete (Trash)</div>
    </div>

    <!-- Menu Klik Kanan SIDEBAR (Unpin) -->
    <div id="ctx-sidebar" class="ctx-menu-style" style="display:none; position:fixed; background:white; border:1px solid #ccc; z-index:1000;">
        <div onclick="unpinRoot()" style="color:red; padding:8px 15px; cursor:pointer;">Unpin Drive</div>
    </div>

    <!-- Menu Klik Kanan AREA KOSONG EXPLORER (New Folder/File) -->
    <div id="ctx-empty" class="ctx-menu-style" style="display:none; position:fixed; background:white; border:1px solid #ccc; z-index:1000;">
        <div onclick="createNewFolder()" style="padding:8px 15px; cursor:pointer;">📁 New Folder</div>
        <div onclick="createNewFile()" style="padding:8px 15px; cursor:pointer;">📄 New Text File</div>
        <hr style="margin:5px 0; border:0; border-top:1px solid #eee;">
        <div onclick="loadData()" style="padding:8px 15px; cursor:pointer;">🔄 Refresh</div>
    </div>

    <style>
        .ctx-menu-style { box-shadow: 2px 2px 10px rgba(0,0,0,0.1); border-radius: 5px; font-size: 13px; }
        .ctx-menu-style div:hover { background: #007bff; color: white; }
    </style>


    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwV0tHF6L4tT2ZERSSCKJ9C6KrtoS9WnNmPIypkAsijju9UbJTYsJPAzA-fCgl5nuaO/exec";
        const params = new URLSearchParams(window.location.search);
        let currentFolderId = params.get('folderId') || ""; // ID folder yang sedang dibuka
        let selectedId = null;
        let selectedName = "";


        // Ganti panggilannya di akhir script saja, bukan di dalam render
        // loadExternalRoots(); 

        async function loadData(id = currentFolderId) {
            currentFolderId = id;
            document.getElementById('status').innerText = "Loading...";
            
            // Pastikan External Roots dimuat dulu SEBELUM render
            if (externalRoots.length === 0) {
                try {
                    const res = await fetch(`${GAS_URL}?action=GET_EXTERNAL_ROOTS`);
                    const data = await res.json();
                    // CEK: Jika data adalah array, pakai data tersebut. Jika tidak, jadikan array kosong.
                    externalRoots = Array.isArray(data) ? data : [];
                } catch(e) { 
                    console.log("Gagal memuat roots, set ke kosong.");
                    externalRoots = []; 
                }
            }

            try {
                const res = await fetch(`${GAS_URL}?action=GET_TREE&folderId=${id}`);
                const data = await res.json();
                render(data);
            } catch (err) {
                console.error("Gagal load tree:", err);
            }
            document.getElementById('status').innerText = "Done";
        }


        function render(data) {
            const list = document.getElementById('file-list');
            const side = document.getElementById('folder-list-side');
            list.innerHTML = "";
            side.innerHTML = "";

            // 1. RENDER EXTERNAL ROOTS (DRIVE LAIN)
            // PROTEKSI: Pastikan externalRoots adalah array sebelum di-loop
            if (externalRoots && Array.isArray(externalRoots)) {
                externalRoots.forEach(root => {
                    const div = document.createElement('div');
                    div.className = `side-item ${root.id === currentFolderId ? 'active' : ''}`;
                    div.innerHTML = `🌐 ${root.name}`;
                    div.onclick = () => window.location.href = `inner_explorer.html?folderId=${root.id}`;
                    
                    // Context Menu untuk Unpin
                    div.oncontextmenu = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        selectedRootId = root.id;
                        const menu = document.getElementById('ctx-sidebar');
                        menu.style.display = 'block';
                        menu.style.left = e.pageX + 'px';
                        menu.style.top = e.pageY + 'px';
                    };
                    side.appendChild(div);
                });
            }

            // 2. TOMBOL HOME ROOT (DRIVE UTAMA)
            const homeDiv = document.createElement('div');
            homeDiv.className = `side-item ${currentFolderId === "" ? 'active' : ''}`;
            homeDiv.innerHTML = `🏠 <b>Home Root</b>`;
            homeDiv.onclick = () => window.location.href = `inner_explorer.html?folderId=`; 
            side.appendChild(homeDiv);
            
            side.innerHTML += `<hr style="border:0; border-top:1px solid #ddd; margin:10px 0;">`;

            // 3. RENDER SUB-FOLDERS (PANEL KIRI & KANAN)
            data.folders.forEach(f => {
                // Panel Kiri
                const sideDiv = document.createElement('div');
                sideDiv.className = `side-item ${f.id === currentFolderId ? 'active' : ''}`;
                sideDiv.innerHTML = `📁 ${f.name}`;
                sideDiv.onclick = () => window.location.href = `inner_explorer.html?folderId=${f.id}`;
                side.appendChild(sideDiv);

                // Panel Kanan (Icon)
                const div = document.createElement('div');
                div.className = "item";
                // Pakai emoji besar di grid kanan agar terlihat jelas
                div.innerHTML = `
                    <div style="font-size: 40px; margin-bottom: 5px;">📁</div>
                    <div class="item-name">${f.name}</div>
                `;
                div.onclick = () => window.location.href = `inner_explorer.html?folderId=${f.id}`;
                div.oncontextmenu = (e) => showCtx(e, f.id, f.name);
                list.appendChild(div);
            });

            // 4. RENDER FILES (PANEL KANAN)
            data.files.forEach(f => {
                const div = document.createElement('div');
                div.className = "item";
                
            // 1. Tentukan icon berdasarkan mime type
            let iconName = "file"; 
            if (f.mime.includes('image')) iconName = "image";
            else if (f.mime.includes('spreadsheet')) iconName = "google-sheets";
            else if (f.mime.includes('document')) iconName = "google-docs";
            else if (f.mime.includes('pdf')) iconName = "pdf";

            // 2. PERBAIKAN URL: Gunakan backtick ` (tombol di bawah Esc)
            // Jangan gunakan tanda kutip ' atau " untuk baris di bawah ini
            div.innerHTML = `
                <img src="https://img.icons8.com/${iconName}.png">
                <div class="item-name">${f.name}</div>
            `;
                
                div.ondblclick = () => {
                    if(window.parent && window.parent.handleFileOpen) {
                        window.parent.handleFileOpen(f);
                    }
                };
                div.oncontextmenu = (e) => showCtx(e, f.id, f.name);
                list.appendChild(div);
            });
        }

        async function unpinRoot() {
            if(confirm("Hapus drive ini dari daftar?")) {
                externalRoots = externalRoots.filter(r => r.id !== selectedRootId);
                await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "SAVE_EXTERNAL_ROOTS", data: externalRoots })
                });
                loadData(currentFolderId);
            }
        }

        function showCtx(e, id, name) {
            e.preventDefault();
            selectedId = id; selectedName = name;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
        }

        window.onclick = () => document.getElementById('ctx-menu').style.display = 'none';

        async function deleteItem() {
            if (confirm(`Hapus ${selectedName} ke Trash?`)) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'MOVE_TO_TRASH', id: selectedId }) });
                loadData();
            }
        }

        async function renameItem() {
            const newName = prompt("Nama baru:", selectedName);
            if (newName) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'RENAME', id: selectedId, newName }) });
                loadData();
            }
        }

        let externalRoots = [];

        async function loadExternalRoots() {
            try {
                const res = await fetch(`${GAS_URL}?action=GET_EXTERNAL_ROOTS`);
                externalRoots = await res.json();
                // Render ulang sidebar setelah data root eksternal diambil
                loadData(currentFolderId); 
            } catch(e) { console.log("Belum ada root eksternal."); }
        }

        async function promptAddRoot() {
            const name = prompt("Nama Drive (Misal: Drive Kantor):");
            if (!name) return;
            const id = prompt("Masukkan ID Folder Google Drive (Hasil Share):");
            if (!id) return;

            externalRoots.push({ name, id });
            
            // Simpan ke Cloud agar permanen
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "SAVE_EXTERNAL_ROOTS", data: externalRoots })
            });
            
            loadData(currentFolderId);
        }

        // Fungsi Create Folder
        async function createNewFolder() {
            const name = prompt("Nama folder baru:");
            if (!name) return;
            
            document.getElementById('status').innerText = "Creating folder...";
            // Gunakan TERMINAL_EXEC atau buat action baru di GAS
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "TERMINAL_EXEC", command: "mkdir", args: name, currentDir: currentFolderId })
            });
            loadData();
        }

        // Fungsi Create File (Simple Text)
        async function createNewFile() {
            const name = prompt("Nama file (misal: catatan.txt):");
            if (!name) return;
            
            // Kirim data dummy/kosong (Base64 dari string kosong adalah "")
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "UPSERT_FILE", name: name, mimeType: "text/plain", base64: "", folderId: currentFolderId })
            });
            loadData();
        }

        // Deteksi klik kanan di area kosong explorer
        document.getElementById('main-container').oncontextmenu = (e) => {
            if (e.target.id === 'file-list' || e.target.id === 'main-container') {
                e.preventDefault();
                const menu = document.getElementById('ctx-empty');
                menu.style.display = 'block';
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
            }
        };

        // Tutup semua menu saat klik kiri di mana saja
        window.onclick = () => {
            document.getElementById('ctx-menu').style.display = 'none';
            document.getElementById('ctx-sidebar').style.display = 'none';
            document.getElementById('ctx-empty').style.display = 'none';
        };

        // Drag & Drop
        window.ondragover = (e) => { e.preventDefault(); document.getElementById('drop-zone').style.display = 'flex'; };
        window.ondragleave = () => document.getElementById('drop-zone').style.display = 'none';
        window.ondrop = async (e) => {
            e.preventDefault();
            document.getElementById('drop-zone').style.display = 'none';
            document.getElementById('status').innerText = "Uploading...";
            for (let file of e.dataTransfer.files) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
                        action: 'UPSERT_FILE', 
                        name: file.name, 
                        mimeType: file.type, 
                        base64: reader.result.split(',')[1], 
                        folderId: currentFolderId
                    })});
                    loadData();
                };
            }
        }

        loadData();
    </script>
</body>
</html>
