<div id="${winId}" class="sub-window" style="width:650px; height:550px; top:50px; left:50px; background: #f4f7f9; display:flex; flex-direction:column;">
                    <div class="win-header" onmousedown="dragWin(this.parentElement)" style="background:#fff; border-bottom:1px solid #ddd; color:#333;">
                        <span>⚙️ System Control Panel</span>
                        <div class="win-controls">
                            <button onclick="closeWin('${winId}')" style="color:#333;"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    
                <div class="win-body" style="flex:1; display:flex; overflow:hidden;">
                        <!-- AREA TENGAH: KONTEN (SCROLLABLE) -->
                    <div style="flex:1; display:flex; overflow:hidden;">
                        <!-- Sidebar Navigasi -->
                        <div style="width:180px; background:#fff; border-right:1px solid #ddd; padding:10px; display:flex; flex-direction:column; gap:5px;">
                            <div class="nav-item active" onclick="switchSettingsTab('sec-account', this)" style="padding:10px; border-radius:8px; cursor:pointer; font-size:13px;"><i class="fas fa-user-circle"></i> Account</div>
                            <div class="nav-item" onclick="switchSettingsTab('sec-desktop', this)" style="padding:10px; border-radius:8px; cursor:pointer; font-size:13px;"><i class="fas fa-desktop"></i> Desktop</div>
                            <div class="nav-item" onclick="switchSettingsTab('sec-monaco', this)" style="padding:10px; border-radius:8px; cursor:pointer; font-size:13px;"><i class="fas fa-code"></i> Editor</div>
                            <div class="nav-item" onclick="switchSettingsTab('sec-system', this)" style="padding:10px; border-radius:8px; cursor:pointer; font-size:13px;"><i class="fas fa-globe"></i> Region & Time</div>
                        </div>

                        <!-- Content Area -->
                        <div id="settings-content-area" style="flex:1; padding:20px; overflow-y:auto; position:relative;">
                            
                            <!-- A. ACCOUNT & SECURITY -->
                            <div id="sec-account" class="settings-tab-content">
                                <h3 style="margin-top:0; font-size:16px;">Account & Security</h3>
                                <div style="display:flex; align-items:center; gap:20px; background:white; padding:20px; border-radius:12px; border:1px solid #eee;">
                                    <div style="text-align:center;">
                                        <div style="position:relative; width:80px; height:80px; margin:0 auto; cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
                                            <img id="preview-avatar" src="${currentPhoto}" style="width:80px; height:80px; border-radius:15px; object-fit:cover; border:2px solid var(--accent);">
                                            <div style="position:absolute; bottom:-5px; right:-5px; background:var(--accent); color:white; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;"><i class="fas fa-camera" style="font-size:10px;"></i></div>
                                        </div>
                                        <input type="file" id="avatar-input" hidden accept="image/*" onchange="previewImageToTarget(this, 'preview-avatar', false)">
                                        <p style="font-size:10px; color:#888; margin-top:8px;">Klik gambar untuk ganti</p>
                                    </div>
                                    <div style="flex:1; display:flex; flex-direction:column; gap:12px;">
                                        <div style="display:flex; align-items:center; gap:10px;">
                                            <input type="text" id="set-username" value="${currentName}" disabled style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px; background:#f0f0f0;">
                                            <label style="display:flex; align-items:center; gap:5px; font-size:11px; cursor:pointer;">
                                                <input type="checkbox" checked onchange="toggleSettingInput('set-username', this)"> Lock
                                            </label>
                                        </div>
                                        <div style="display:flex; align-items:center; gap:10px;">
                                            <input type="password" id="set-password" placeholder="Password Baru" disabled style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px; background:#f0f0f0;">
                                            <label style="display:flex; align-items:center; gap:5px; font-size:11px; cursor:pointer;">
                                                <input type="checkbox" checked onchange="toggleSettingInput('set-password', this)"> Lock
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                                                <!-- B1. DESKTOP SETTING -->
                            <div id="sec-desktop" class="settings-tab-content" style="display:none;">
                                <h3 style="margin-top:0; font-size:16px;">Desktop Appearance</h3>
                                <div style="background:white; padding:20px; border-radius:12px; border:1px solid #eee; display:flex; flex-direction:column; gap:15px;">
                                    
                                    <!-- Preview Wallpaper & Mode -->
                                    <div style="display:flex; gap:20px; align-items:flex-start;">
                                        <div style="text-align:center;">
                                            <div id="preview-bg-box" onclick="document.getElementById('bg-input').click()" 
                                                style="width:140px; height:85px; border-radius:10px; background:url('${currentBg}') center/cover, ${currentBgColor}; border:2px solid #ddd; cursor:pointer; position:relative; overflow:hidden;">
                                                <div style="position:absolute; inset:0; background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; color:white; font-size:10px; opacity:0; transition:0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">Ubah Gambar</div>
                                            </div>
                                            <input type="file" id="bg-input" hidden accept="image/*" onchange="previewImageToTarget(this, 'preview-bg-box', true)">
                                            <button onclick="clearDesktopImg()" style="margin-top:8px; border:none; background:none; color:#e74c3c; cursor:pointer; font-size:11px; font-weight:bold;"><i class="fas fa-eraser"></i> Hapus Gambar</button>
                                        </div>

                                        <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
                                            <div>
                                                <label style="font-size:11px; font-weight:bold; color:#666;">Display Mode:</label>
                                                <select id="set-bg-mode" onchange="applyDesktopPreview()" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                                    <option value="stretch">Stretch (Penuhi Layar)</option>
                                                    <option value="center">Center (Tengah Asli)</option>
                                                    <option value="tile">Tile (Berulang)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label style="font-size:11px; font-weight:bold; color:#666;">Background Color:</label>
                                                <div style="display:flex; align-items:center; gap:10px; margin-top:4px;">
                                                    <input type="color" id="set-bg-color" value="${currentBgColor}" onchange="applyDesktopPreview()" style="border:none; width:40px; height:35px; cursor:pointer; padding:0; background:none;">
                                                    <span style="font-size:11px; color:#888;">Warna di bawah gambar</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <hr style="border:0; border-top:1px solid #eee;">

                                    <!-- Windows Theme Selection -->
                                    <div>
                                        <label style="font-size:11px; font-weight:bold; color:#666;">Windows Theme:</label>
                                        <select id="set-win-theme" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                            <option value="dark">Dark Mode (Default)</option>
                                            <option value="light">Light Mode</option>
                                            <option value="bluedark">Deep Blue Ocean</option>
                                            <option value="greendark">Forest Grey</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- B2. MONACO EDITOR SETTING -->
                            <div id="sec-monaco" class="settings-tab-content" style="display:none;">
                                <h3 style="margin-top:0; font-size:16px;">Monaco Editor Settings</h3>
                                <div style="background:white; padding:20px; border-radius:12px; border:1px solid #eee; display:flex; flex-direction:column; gap:15px;">
                                    <div>
                                        <label style="font-size:11px; font-weight:bold; color:#666;">Editor Theme:</label>
                                        <select id="set-monaco-theme" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                            <option value="vs-dark">Dark (VS Code Style)</option>
                                            <option value="vs">Light</option>
                                            <option value="hc-black">High Contrast</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label style="font-size:11px; font-weight:bold; color:#666;">Font Family:</label>
                                        <select id="set-monaco-font" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                            <option value="'Consolas', 'Courier New', monospace">Consolas (Default)</option>
                                            <option value="'Fira Code', monospace">Fira Code</option>
                                            <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                                            <option value="'Source Code Pro', monospace">Source Code Pro</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                                                <!-- C. SYSTEM REGION & TIME -->
                            <div id="sec-system" class="settings-tab-content" style="display:none;">
                                <h3 style="margin-top:0; font-size:16px;">System Region & Time</h3>
                                <div style="background:white; padding:20px; border-radius:12px; border:1px solid #eee; display:flex; flex-direction:column; gap:15px;">
                                    <div>
                                        <label style="font-size:11px; font-weight:bold; color:#666;">Region Setting:</label>
                                        <select id="set-region" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                            <option value="id-ID">Indonesia (id-ID)</option>
                                            <option value="en-US">English (en-US)</option>
                                            <option value="ja-JP">Japan (ja-JP)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label style="font-size:11px; font-weight:bold; color:#666;">Date Format:</label>
                                        <select id="set-date-format" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                            <option value="dd/MM/yyyy">DD/MM/YYYY (31/12/2024)</option>
                                            <option value="MM/dd/yyyy">MM/DD/YYYY (12/31/2024)</option>
                                            <option value="dddd, MMMM yyyy">Full Date (Selasa, Maret 2024)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label style="font-size:11px; font-weight:bold; color:#666;">Time Format:</label>
                                        <select id="set-hour-format" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin-top:4px;">
                                            <option value="24h">24-Hour (13:00:00)</option>
                                            <option value="12h">12-Hour (01:00:00 PM)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                        </div> <!-- End Content Area -->
                    </div>
                        <!-- Tombol Save di Bawah (Sticky) -->
                        <div style="padding:15px; background:white; border-top:1px solid #ddd; display:flex; justify-content:flex-end; gap:10px;">
                            <button onclick="closeWin('win-settings')" style="padding:8px 20px; border-radius:20px; border:1px solid #ccc; background:none; cursor:pointer;">Cancel</button>
                            <button onclick="saveAllSettings()" style="padding:8px 25px; border-radius:20px; border:none; background:var(--accent); color:white; font-weight:bold; cursor:pointer;">Apply Changes</button>
                        </div>
                    </div> <!-- End win-body -->
                </div>
