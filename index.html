            --accent: #0056b3; 
            --border: rgba(0,0,0,0.1);

        /* Pastikan di atas segalanya */
        .swal2-container {
            z-index: 999999 !important;

        /* TERAPKAN VARIABEL KE ELEMEN (Pastikan elemen pakai var ini) */

        .sub-window {

    <!-- Script tetep pake yang terakhir gue kirim, TAPI tambahin event.stopPropagation() di tombol start (cek kode di atas) -->
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx9Ro4sfzFRP-Yjlm-4FbsaMdbSPgHTAisUsaiRS9c9Ei5kgzvgNn1ft90qCPb7f837/exec";
        const ROOT_ID = "1UhZoOSqtzhRALHy_LCchaDztPDkxs45B";
        //const STORED_HASH = "3d9996762c9d4c321426951df2368b02cd5489074a671a0ddd0298aec8622a0e"; //webOS@ksc111981//HASH_SHA256_PASSWORD_KAMU
        
        let windowCount = 0;
        const editors = {};
        const MONACO_VER = "0.53.0"; 
        //const MONACO_BASE = `https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/${MONACO_VER}/min/vs`;
        const MONACO_BASE = `./monaco-editor-0.55.1/package/min/vs`;
        let isMonacoReady = false; // Flag status Monaco
        let isMonacoLoading = false; // Flag tambahan supaya tidak load berkali-kali
        let monacoQueue = [];      // Antrean fungsi jika belum ready  


        // KRUSIAL: Jalankan ini langsung saat script terbaca agar background muncul instan
        // Jalankan ini agar background muncul instan TANPA nge-lock CSS
        (function applyImmediateStyles() {
            const bg = localStorage.getItem("desktopBg");
            const color = localStorage.getItem("desktopBgColor") || "#2c3e50";
            const mode = localStorage.getItem("desktopBgMode") || "stretch";

            // Kita tunggu sebentar sampai elemen #desktop-nya 'lahir' di DOM
            const checkDesktop = setInterval(() => {
                const desktop = document.getElementById('desktop');
                if (desktop) {
                    clearInterval(checkDesktop);
                    
                    // Pasang secara INLINE (Ini kuat, tapi bisa ditimpa JS nanti)
                    desktop.style.backgroundColor = color;

                        desktop.style.backgroundImage = `url('${bg}')`;
                    }
                    
                    // Set Mode

                        desktop.style.backgroundSize = "100% 100%";
                        desktop.style.backgroundRepeat = "no-repeat";
                    } else if (mode === "center") {
                        desktop.style.backgroundSize = "auto";
                        desktop.style.backgroundRepeat = "no-repeat";
                        desktop.style.backgroundPosition = "center";
                    } else {
                        desktop.style.backgroundSize = "auto";
                        desktop.style.backgroundRepeat = "repeat";
                    }
                    console.log("Instant background applied via inline style.");
                }
            }, 10); // Cek setiap 10ms (cepet banget)
        })();


        // menuliskan IP addres ke component DCOM agar siap dulu
        document.addEventListener('DOMContentLoaded', function() {
            // UI sudah siap, sekarang panggil fungsi IP
            getVisitorIP(function(ip) {
                const ipField = document.getElementById('ip-addr');
                if (ipField) {
                    ipField.textContent = ip ? `IP: ${ip}` : "IP: xxx.xxx.xxx.xxx";
                }
            });
        });


        // Setup Environment (Anti vs/vs)
        window.MonacoEnvironment = {
            getWorkerUrl: function (workerId, label) {
                // Mengarahkan worker ke file workerMain.js di repo kamu via JSDelivr
                const workerPath = `${MONACO_BASE}/base/worker/workerMain.js`;
                const code = `
                    self.MonacoEnvironment = { baseUrl: '${MONACO_BASE}/' };
                    importScripts('${workerPath}');
                `;
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(code)}`;
            }
        };


        function loadMonacoCore(callback) {
            if (isMonacoReady) { if (callback) callback(); return; }
            if (callback) monacoQueue.push(callback);
            if (isMonacoLoading) return;

            isMonacoLoading = true;
            OS.showLoading('Memasok Engine Monaco 0.55.1 dari GitHub...');

            const script = document.createElement('script');
            script.src = `${MONACO_BASE}/loader.js`; // Loader dari repo kamu
            
            script.onload = () => {
                // Konfigurasi path ke folder 'min/vs' di repo kamu
                require.config({ paths: { 'vs': MONACO_BASE } });

                require(['vs/editor/editor.main'], function() {
                    isMonacoReady = true;
                    isMonacoLoading = false;
                    Swal.close();
                    console.log("Monaco 0.55.1 (GitHub/min) Ready!");
                    while (monacoQueue.length > 0) {
                        const nextTask = monacoQueue.shift();
                        nextTask();
                    }
                });
            };
            document.head.appendChild(script);
        }


        async function sha256(str) {
            const buf = new TextEncoder().encode(str);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Function to retrieve the visitor's IP address
        function getVisitorIP(callback) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://api.ipify.org?format=json', true);
                xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText);
                    callback(response.ip);
                }
                };
                xhr.send();
            }



        async function attemptLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const passHash = await sha256(pass);
            
            let uuid = localStorage.getItem("webos_uuid") || self.crypto.randomUUID();
            localStorage.setItem("webos_uuid", uuid);

            //Swal.fire({ title: 'Authenticating...', didOpen: () => { Swal.showLoading(); } });
            OS.showLoading('Authenticating...');

            console.log("habis swal loading");
            const ipField = document.getElementById('ip-addr');

            const clientIP = (ipField) ? ipField.textContent : "IP: tidak sempat diambil" ;

            console.log("habis dapat ip", clientIP);

                // 2. Deteksi Browser & Device Type (navigator.userAgent)
            const ua = navigator.userAgent; // info client pakai apa lengkap
            console.log("baca ua: ",ua)
            let deviceType = "Desktop";
            if (/Mobi|Android|iPhone/i.test(ua)) {  //deteksi android bukan?
                    deviceType= "Mobile";
                    } else {
                    deviceType= "Desktop";
                    }

                const deviceInfo = `${deviceType} (${ua}) - IP: ${clientIP}`;
                console.log("habis dapat browser :", deviceInfo);
            try {

                const payload = {
                        action: "LOGIN",
                        username: user,
                        password: passHash,
                        uuid: uuid,
                        device: deviceInfo,
                        wallpaper: (typeof wallpaper !== 'undefined') ? wallpaper : "" // Proteksi jika wallpaper null
                    };
                    console.log("Data yang dikirim:", payload);
                // 3. Kirim ke GAS
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                    
                });
                console.log("Response diterima dari server");
                const result = await response.json();
                console.log("Hasil JSON:", result);

               if (result.status === "success") {
                    console.log("Login sukses, menyinkronkan pengaturan...");
                    Swal.close();
                    document.getElementById('login-screen').style.display = 'none';

                    // 1. Simpan Status Autentikasi Dasar
                    sessionStorage.setItem("isAuth", "true");
                    sessionStorage.setItem("userName", result.user);
                    sessionStorage.setItem("userPhoto", result.photo || "");
                    
                    // 2. Simpan Wallpaper (Gunakan result.wallpaper dari database)
                    const bgUrl = result.wallpaper || "";
                    sessionStorage.setItem("userWallpaper", bgUrl);
                    localStorage.setItem("desktopBg", bgUrl); // Simpan permanen agar tidak putih saat reload

                    // 3. Sinkronkan Pengaturan Visual (Data dari Kolom H)
                    const s = result.settings || {}; 
                    localStorage.setItem("desktopBgColor", s.bgColor || "#2c3e50");
                    localStorage.setItem("desktopBgMode", s.bgMode || "stretch");
                    localStorage.setItem("sysWinTheme", s.theme || "dark");
                    localStorage.setItem("sysRegion", s.region || "id-ID");
                    localStorage.setItem("sysDateFormat", s.dateFormat || "dd/MM/yyyy");
                    localStorage.setItem("sysHourFormat", s.hourFormat || "24h");
                    // --- SINKRONKAN SETTINGAN MONACO ---
                    localStorage.setItem("sysMonacoTheme", s.monacoTheme || "vs-dark");
                    localStorage.setItem("sysMonacoFont", s.monacoFont || "'Consolas', monospace");
                    localStorage.setItem("sysMonacoSize", s.monacoSize || 14);

                    // 4. Nyalakan OS dengan data yang sudah lengkap
                    initOS();
                } else {
                    Swal.close();
                    //Swal.fire("Access Denied", result.msg, "error");
                     OS.notify("Access Denied", result.msg, "error");
                    
                }
            } catch (e) {
                Swal.close();
                //Swal.fire("Error", "Gagal mendeteksi koneksi atau server down", "error");
                OS.notify("Error", "Gagal mendeteksi koneksi atau server down", "error");
            }
            Swal.close();
        }



        function initOS() {
            updateClock(); 
            setInterval(updateClock, 1000);
            restoreCloudSession();

            const name = sessionStorage.getItem("userName") || "Guest";
            let photo = sessionStorage.getItem("userPhoto");
            const bgUrl = sessionStorage.getItem("userWallpaper"); // Ambil URL Wallpaper
            const savedTheme = localStorage.getItem("sysWinTheme") || "dark";
            applyTheme(savedTheme);

            // Fallback kalau photo kosong
            if (!photo || photo === "undefined") {
                photo = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;
            }

            // 1. Terapkan Wallpaper ke Desktop
            const desktop = document.getElementById('desktop');
            if (bgUrl && bgUrl !== "" && bgUrl !== "undefined") {
                desktop.style.backgroundImage = "url('" + bgUrl + "')";
                
                // Ambil settingan mode (stretch/center/tile) dari localStorage
                const bgMode = localStorage.getItem("desktopBgMode") || "stretch";
                
                // Terapkan style sesuai mode
                if (bgMode === "stretch") {
                    desktop.style.backgroundSize = "100% 100%";
                    desktop.style.backgroundRepeat = "no-repeat";
                } else if (bgMode === "center") {
                    desktop.style.backgroundSize = "auto";
                    desktop.style.backgroundRepeat = "no-repeat";
                    desktop.style.backgroundPosition = "center";
                } else { // tile
                    desktop.style.backgroundSize = "auto";

            // UPDATE LANGSUNG KE ELEMEN YANG SUDAH ADA
            const imgEl = document.getElementById('user-photo-img');
            const nameEl = document.getElementById('user-name-span');

            if (imgEl) imgEl.src = photo;
            if (nameEl) nameEl.innerText = name;                
                document.getElementById('desktop').style.backgroundImage = `url('${bgUrl}')`;
            }


    

        function createNewExplorer(folderId = ROOT_ID, title = "Explorer") {
            windowCount++;
            const winId = `win-${windowCount}`;
            const appId = `app-${winId}`;
            const winHtml = `
                <!-- <div id="${winId}" class="sub-window" style="top:80px; left:80px;" onmousedown="focusWin('${winId}')"> -->
                <div id="${winId}" class="sub-window" style="top:80px; left:80px; width:600px; height:400px; resize: both; overflow: hidden; display: flex; flex-direction: column;" onmousedown="focusWin('${winId}')">
                    <div class="win-header" onmousedown="dragWin(this.parentElement)">
                        <span>📁 ${title}</span>
                        <div class="win-controls">
                            <button onclick="toggleMinimize('${winId}')" title="Minimize" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-window-minimize"></i></button>
                            <button onclick="maximizeWin('${winId}')" title="Maximize" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-window-maximize"></i></button>
                            <button onclick="closeWin('${winId}')" title="Close" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                    <div class="win-body">
                        <iframe src="inner_explorer.html?folderId=${folderId}&pName=${encodeURIComponent(title)}" style="width:100%; height:100%; border:none;"></iframe>
                    </div>
                </div>`;
            document.getElementById('desktop').insertAdjacentHTML('beforeend', winHtml);
            addToTaskbar(winId, appId, title);
            
        }
        
        async function saveFileContent(winId, fileId) {
            if (!editors[winId]) return;
            const content = editors[winId].getValue(); // Ambil teks dari Monaco
            
            // LOGIKA EKSPLISIT: Jika file baru (tidak ada ID), paksa Save As
            if (!fileId || fileId === "" || fileId === "undefined") {
                saveFileAs(winId, fileId);
                return;
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "SAVE_FILE_CONTENT",
                        id: fileId,
                        content: content // Konten kodingan dibungkus di sini
                    })
                });
                
                const result = await response.json();
                if (result.status === "success") {

            el.onmousedown = (e) => {

                focusWin(el.id);

                document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'none');
                let p3 = e.clientX, p4 = e.clientY;
                document.onmousemove = (e) => {
                    el.style.top = (el.offsetTop - (p4 - e.clientY)) + "px";
                    el.style.left = (el.offsetLeft - (p3 - e.clientX)) + "px";
                    p3 = e.clientX; p4 = e.clientY;
                };
                document.onmouseup = () => {
                    document.onmousemove = null;
                    document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'auto');
                };
            };

        function closeWin(winId) {

            if (!win) return;

            // 1. LOGIKA SAFETY (Hanya jika ini jendela Editor/Monaco)
            if (editors[winId]) {
                const currentContent = editors[winId].getValue();
                const originalContent = win.dataset.originalContent || "";

                if (currentContent !== originalContent) {
                    if (!confirm("Ada perubahan yang belum disimpan di editor ini. Yakin mau tutup?")) {
                        return; // Batal tutup

                }
                // Bersihkan memory Monaco
                editors[winId].dispose();
                delete editors[winId];
            }

            // 2. HAPUS ELEMEN JENDELA

        function initMonacoInWin(winId, fileId, fileName) {
            require(['vs/editor/editor.main'], async function() {
                try {
                    let finalContent = ""; 
                    // Di dalam initMonacoInWin() index.html
                    const savedTheme = localStorage.getItem("sysMonacoTheme") || "vs-dark";
                    const savedFont = localStorage.getItem("sysMonacoFont") || "'Consolas', monospace";
                    const savedSize = parseInt(localStorage.getItem("sysMonacoSize")) || 14;

                    // LOGIKA EKSPLISIT: Ambil konten jika ada ID
                    if (fileId && fileId !== "") {
                        const res = await fetch(`${GAS_URL}?action=READ_FILE&id=${fileId}`);
                        const data = await res.json();
                        
                        // Pastikan akses data.content
                        if (data && data.content !== undefined) {
                            finalContent = data.content;
                        }
                    }

                    const ext = fileName.split('.').pop().toLowerCase();
                    const langMap = { 'js': 'javascript', 'html': 'html', 'css': 'css', 'json': 'json', 'py': 'python', 'txt': 'plaintext' };

                    // BAGIAN INI TETAP (Settingan Monaco lo yang lengkap)
                    editors[winId] = monaco.editor.create(document.getElementById(`container-${winId}`), {
                        value: finalContent,
                        language: langMap[ext] || 'plaintext',
                        theme: savedTheme, // Pakai hasil simpanan
                        automaticLayout: true,
                        fontFamily: savedFont, // Pakai hasil simpanan
                        fontSize: savedSize, // Pasang ukuran simpanan
                        fixedOverflowWidgets: true, 
                        minimap: { enabled: false },
                        scrollBeyondLastLine: false
                    });

                    // BAGIAN INI TETAP
                    addEditorShortcuts(winId, fileId);
                    document.getElementById(winId).dataset.originalContent = finalContent;

                } catch (err) {
                    // CATCH HANYA UNTUK HANDLE ERROR (Network/Server Error)
                    console.error("Critical Error pada initMonaco:", err);
                    alert("Terjadi kesalahan sistem saat memuat editor.");
                }
            });
        }


        // 1. Fungsi Save As (Buat file baru dari isi editor)
        async function saveFileAs(winId, fileId) {
            if (!editors[winId]) return;
            const content = editors[winId].getValue();
            
            // AMBIL NAMA DARI HEADER SECARA AMAN
            const headerSpan = document.querySelector(`#${winId} .win-header span`);
            // Ganti 'oldName' dengan logika ini:
            const currentName = headerSpan ? headerSpan.innerText.replace('📝 ', '') : "Untitled.js";
            
            const newName = prompt("Simpan sebagai (Nama File Baru):", currentName);
            if (!newName) return;

            try {
                // Cek apakah ini file baru atau copy dari file lama
                const isNewFile = (!fileId || fileId === "" || fileId === "undefined");
                const actionType = isNewFile ? "UPSERT_FILE" : "COPY_FILE";
                
                const payload = {
                    action: actionType,
                    id: fileId,
                    name: newName,      // Untuk UPSERT
                    newName: newName,   // Untuk COPY
                    content: content,
                    base64: btoa(unescape(encodeURIComponent(content))), // Base64 yang aman untuk karakter unik
                    mimeType: "text/plain",
                    folderId: ROOT_ID
                };

                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if(data.status === "success") {
                    //Swal.fire("Berhasil!", "File disimpan ke Drive.", "success");
                    OS.notify("Berhasil!", "File disimpan ke Drive.", "success");
                    closeWin(winId); // Tutup jendela "Untitled"
                    openEditor(data.id, data.name || newName); // Buka file yang baru dibuat (sudah ada ID-nya)
                }
            } catch (e) { 
                console.error(e);
                //Swal.fire("Gagal", "Terjadi kesalahan saat menyimpan.", "error");
                OS.notify("Gagal", "Terjadi kesalahan saat menyimpan.", "error");
            }
        }


        // 2. Fungsi Keyboard Shortcut Ctrl+S (Internal Monaco)
        function addEditorShortcuts(winId, fileId) {
            const editor = editors[winId];

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                saveFileContent(winId, fileId);
            });
        }

        // 1. Switch Tab Sidebar
        function switchSettingsTab(tabId, el) {
            document.querySelectorAll('.settings-tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active');
                n.style.background = 'none';
                n.style.fontWeight = 'normal';
            });
            
            document.getElementById(tabId).style.display = 'block';
            el.style.background = '#f0f0f0';

        // 2. Lock/Unlock Checkbox Logic
        function toggleSettingInput(targetId, chk) {
            const input = document.getElementById(targetId);
            input.disabled = chk.checked; // Checked = Lock
            input.style.background = chk.checked ? "#f0f0f0" : "#fff";
        }

        // 3. Preview Image Logic (Avatar & Desktop)
        function previewImageToTarget(input, targetId, isDiv) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    const previewBox = document.getElementById(targetId);
                    
                    // --- LOGIKA INTIP DIMENSI ASLI GAMBAR ---
                    const img = new Image();
                    img.src = dataUrl;
                    img.onload = function() {
                        // Simpan rasio gambar (Lebar / Tinggi) ke dalam dataset elemen
                        // Contoh: Gambar Landscape bakal > 1, Potrait bakal < 1
                        if (previewBox) {
                            previewBox.dataset.imgRatio = img.width / img.height;
                        }
                        
                        if (isDiv) {
                            // Update background kotak preview
                            previewBox.style.backgroundImage = `url('${dataUrl}')`;
                            // Langsung sinkronkan visual miniatur sesuai mode yang terpilih
                            updateMiniPreview(); 
                        } else {
                            // Jika targetnya elemen <img> (seperti Avatar)
                            previewBox.src = dataUrl;
                        }
                        console.log("Gambar terbaca:", img.width, "x", img.height, "Ratio:", previewBox.dataset.imgRatio);
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }




       function applyDesktopPreview() {
            const previewBox = document.getElementById('preview-bg-box');
            const desktop = document.getElementById('desktop');
            
            // Proteksi: Jika elemen belum ada di DOM (Settings belum dibuka), stop di sini.
            if (!previewBox || !desktop) return; 

            //const mode = document.getElementById('set-bg-mode').value;            
            //const color = document.getElementById('set-bg-color').value;
            
            // PASTIKAN: Ambil dari localStorage jika element select tidak ditemukan (saat awal loading)
            // Atau ambil langsung dari dropdown jika jendela settings sedang terbuka
            const modeSelect = document.getElementById('set-bg-mode');
            const mode = modeSelect ? modeSelect.value : (localStorage.getItem("desktopBgMode") || "stretch");
            
            const colorInput = document.getElementById('set-bg-color');
            const color = colorInput ? colorInput.value : (localStorage.getItem("desktopBgColor") || "#2c3e50");
            
            // 1. Sinkronkan Warna
            previewBox.style.backgroundColor = color;
            desktop.style.backgroundColor = color;

            // 2. Sinkronkan Gambar (DENGAN VALIDASI ANTI-404)
            const currentImg = previewBox.style.backgroundImage;
            if (currentImg && currentImg !== "none" && currentImg !== "undefined" && currentImg !== "") {
                desktop.style.backgroundImage = currentImg;
            } else {
                desktop.style.backgroundImage = "none";
            }

            // 3. Sinkronkan Mode (Gunakan satu blok pengecekan untuk keduanya)
            if (mode === "stretch") {
                previewBox.style.backgroundSize = "100% 100%";
                previewBox.style.backgroundRepeat = "no-repeat";
                
                desktop.style.backgroundSize = "100% 100%";
                desktop.style.backgroundRepeat = "no-repeat";
            } else if (mode === "center") {
                previewBox.style.backgroundSize = "auto";
                previewBox.style.backgroundRepeat = "no-repeat";
                
                desktop.style.backgroundSize = "auto";
                desktop.style.backgroundRepeat = "no-repeat";
                desktop.style.backgroundPosition = "center";
            } else { // Tile
                previewBox.style.backgroundSize = "50%"; // Preview diperkecil biar kelihatan tile-nya
                previewBox.style.backgroundRepeat = "repeat";
                
                desktop.style.backgroundSize = "auto";
                desktop.style.backgroundRepeat = "repeat";
            }
        }

       async function saveAllSettings() {
            OS.showLoading("Syncing to Cloud...");

            const bgRaw = document.getElementById('preview-bg-box').style.backgroundImage;
            let cleanBgData = null;

            if (bgRaw && bgRaw.includes("data:image")) {
                cleanBgData = bgRaw.replace(/^url\(["']?/, '').replace(/["']?\)$/, '');
            }

            // 1. TAMBAHKAN DATA SETTING KE PAYLOAD
            const payload = {
                action: "UPDATE_PROFILE",
                uuid: localStorage.getItem("webos_uuid"),
                username: !document.getElementById('chk-user').checked ? document.getElementById('set-username').value : null,
                password: !document.getElementById('chk-pass').checked ? await sha256(document.getElementById('set-password').value) : null,
                avatarData: document.getElementById('preview-avatar').src.startsWith("data:image") ? document.getElementById('preview-avatar').src : null,
                bgData: cleanBgData,

                // --- TAMBAHKAN INI UNTUK MONACO ---
                monacoTheme: document.getElementById('set-monaco-theme').value,
                monacoFont: document.getElementById('set-monaco-font').value,
                monacoSize: document.getElementById('set-monaco-size').value,
                
                // --- DATA BARU UNTUK KOLOM H ---
                bgColor: document.getElementById('set-bg-color').value,
                bgMode: document.getElementById('set-bg-mode').value,
                theme: document.getElementById('set-win-theme').value,
                region: document.getElementById('set-region').value,
                dateFormat: document.getElementById('set-date-format').value,
                hourFormat: document.getElementById('set-hour-format').value
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if (result.status === "success") {
                        // 1.1 UPDATE NAMA USER (Gunakan value dari input)
                        const newUsername = document.getElementById('set-username').value;
                        if (!document.getElementById('chk-user').checked && newUsername) {
                            sessionStorage.setItem("userName", newUsername);
                            const nameEl = document.getElementById('user-name-span');
                            if (nameEl) nameEl.innerText = newUsername; // Langsung ubah teks di Start Menu
                        }

                        // 1.2. UPDATE FOTO PROFIL (Gunakan respon dari GAS)
                        if (result.newAvatar) {
                            sessionStorage.setItem("userPhoto", result.newAvatar);
                            const imgEl = document.getElementById('user-photo-img');
                            if (imgEl) imgEl.src = result.newAvatar; // Langsung ubah gambar di Start Menu
                        }

                        // 1.3. UPDATE WALLPAPER (Gunakan respon dari GAS)
                        if (result.newWallpaper) {
                            sessionStorage.setItem("userWallpaper", result.newWallpaper);
                            localStorage.setItem("desktopBg", result.newWallpaper);
                            
                            // Update kotak preview agar tidak lagi menampilkan Base64
                            const pb = document.getElementById('preview-bg-box');
                            if (pb) pb.style.backgroundImage = `url('${result.newWallpaper}')`;
                        }

                    // 2. SIMPAN KE LOCAL STORAGE (Sesuai payload tadi)
                    localStorage.setItem("desktopBgColor", payload.bgColor);
                    localStorage.setItem("desktopBgMode", payload.bgMode);
                    localStorage.setItem("sysWinTheme", payload.theme);
                    localStorage.setItem("sysRegion", payload.region);
                    localStorage.setItem("sysDateFormat", payload.dateFormat);
                    localStorage.setItem("sysHourFormat", payload.hourFormat);
                    
                    // 3. Update Wallpaper & Aset (Foto Profil)
                    if (result.newWallpaper) {
                        localStorage.setItem("desktopBg", result.newWallpaper); 
                        sessionStorage.setItem("userWallpaper", result.newWallpaper);
                        const pb = document.getElementById('preview-bg-box');
                        if (pb) pb.style.backgroundImage = `url('${result.newWallpaper}')`;
                    }

                    if (result.newAvatar) {
                        sessionStorage.setItem("userPhoto", result.newAvatar);
                        const imgEl = document.getElementById('user-photo-img');
                        if (imgEl) imgEl.src = result.newAvatar;
                    }

                    // 4. Jalankan Update UI
                    
                    applyDesktopPreview(); 
                    updateAllMonacoEditors();
                    updateClock();
                    applyTheme(payload.theme);

                    OS.notify("Success!", "Semua perubahan tersimpan ke Cloud!", "success");
                }
            } catch (e) {
                console.error("Save Error:", e);
                OS.notify("Error", "Gagal sinkronisasi ke server.", "error");
            }
        }


        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (!clockEl) return;

            const region = localStorage.getItem("sysRegion") || "id-ID";
            const hour12 = localStorage.getItem("sysHourFormat") === "12h";
            const dateFormat = localStorage.getItem("sysDateFormat") || "dd/MM/yyyy";

            const now = new Date();

            // 1. Ambil Komponen Jam secara terpisah agar bisa dimanipulasi
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Logika Berkedip: Munculkan titik dua jika detik genap, transparan jika ganjil
            const blink = now.getSeconds() % 2 === 0 ? ":" : "<span style='opacity:0;'>:</span>";
            
            // Gabungkan Jam (Format 24 jam atau 12 jam)
            let displayHours = hours;
            let ampm = "";
            if (hour12) {
                const h = now.getHours();
                ampm = h >= 12 ? " PM" : " AM";
                displayHours = String(h % 12 || 12).padStart(2, '0');
            }

            const timeStr = `${displayHours}${blink}${minutes}${blink}${seconds}${ampm}`;

            // 2. Format Tanggal (Tetap sama)
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const dayName = now.toLocaleDateString(region, { weekday: 'long' });
            const monthName = now.toLocaleDateString(region, { month: 'long' });

            let dateStr = dateFormat
                .replace("dddd", dayName)
                .replace("MMMM", monthName)
                .replace("dd", day)
                .replace("MM", month)
                .replace("yyyy", year);

            // Tampilkan dengan style agar rata kanan
            clockEl.innerHTML = `
                <div style="text-align:right; line-height:1.2;">
                    <span style="font-family: monospace; font-size: 14px;">${timeStr}</span><br>
                    <span style="font-size:10px; font-weight:normal; opacity:0.8;">${dateStr}</span>
                </div>`;
        }


        function applyTheme(themeName) {
            // 1. Hapus semua class theme lama di body
            document.body.classList.remove('theme-light', 'theme-bluedark', 'theme-greendark');
            
            // 2. Tambah class baru jika bukan default (dark)
            if (themeName !== 'dark') {
                document.body.classList.add('theme-' + themeName);
            }
            
            // 3. Simpan ke localStorage
            localStorage.setItem("sysWinTheme", themeName);
        }

        function updateMiniPreview() {
            const previewBox = document.getElementById('preview-bg-box');
            if (!previewBox) return;

            const mode = document.getElementById('set-bg-mode').value;
            const color = document.getElementById('set-bg-color').value;
            const imgRatio = parseFloat(previewBox.dataset.imgRatio) || 1; // Default 1:1
            
            previewBox.style.backgroundColor = color;
            
            if (mode === "stretch") {
                previewBox.style.backgroundSize = "100% 100%"; // Dipaksa penuh
            } else if (mode === "center") {
                // Logika Smart Center: 
                // Jika gambar lebih lebar dari kotak, lebarnya jadi 40%. 
                // Jika lebih tinggi, tingginya yang jadi 40%.
                if (imgRatio > 1) {
                    previewBox.style.backgroundSize = "40% auto"; 
                } else {
                    previewBox.style.backgroundSize = "auto 40%";
                }
                previewBox.style.backgroundPosition = "center";
            } else { // Tile
                // Ubin kecil yang tetep proporsional (ngikutin rasio asli gambarnya)
                const tileW = 25; 
                const tileH = 25 / imgRatio;
                previewBox.style.backgroundSize = `${tileW}px ${tileH}px`;
                previewBox.style.backgroundRepeat = "repeat";
            }
        }

        const OS = {
        // Notifikasi Biasa (Success, Error, Warning, Info)

            Swal.fire({
                title: title,
                text: text,
                icon: icon,

                confirmButtonColor: 'var(--swal-confirm)',

                heightAuto: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        },

        // Konfirmasi (Ya/Tidak)
        confirm: async function(title, text) {
            const result = await Swal.fire({
                title: title,
                text: text,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Yes',
                cancelButtonText: 'Cancel',
                heightAuto: false,
                confirmButtonColor: 'var(--swal-confirm)',
            });
            return result.isConfirmed;
        }
