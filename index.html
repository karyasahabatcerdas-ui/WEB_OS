<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>WEB_OS | Private Cloud Desktop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FontAwesome untuk Icon -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- sweet allert   -->
     <script src=" https://cdn.jsdelivr.net/npm/sweet-alert@2.0.5/sweet-alert.min.js "></script>

    <style>
        :root { --bg-panel: rgba(255, 255, 255, 0.7); --text-main: #333; --accent: #007bff; --border: rgba(0,0,0,0.1); }
        [data-theme="dark"] { --bg-panel: rgba(30, 30, 30, 0.85); --text-main: #f0f0f0; --border: rgba(255,255,255,0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #2c3e50; }
        #desktop { width: 100vw; height: calc(100vh - 50px); background: url('https://images.unsplash.com') center/cover; position: relative; }
        
        .taskbar { height: 50px; background: var(--bg-panel); backdrop-filter: blur(15px); position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; z-index: 10000; border-top: 1px solid var(--border); }
        .start-btn { cursor: pointer; padding: 0 20px; height: 100%; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--accent); }
        .start-btn:hover { background: rgba(0,0,0,0.1); }

        .sub-window { position: absolute; width: 600px; height: 400px; background: var(--bg-panel); backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); z-index: 10; }
        .win-header { padding: 10px 15px; background: rgba(0,0,0,0.05); cursor: move; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); font-weight: bold; }
        .win-body { flex: 1; overflow: hidden; background: white; }        
        .win-controls button { background: none; border: none; cursor: pointer; padding: 5px; color: var(--text-main); }

        .login-screen { position: fixed; inset: 0; background: #2c3e50; z-index: 20000; display: flex; align-items: center; justify-content: center; color: white; flex-direction: column; }
        
        #start-menu { position: absolute; bottom: 55px; left: 10px; width: 280px; background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); display: none; z-index: 10001; padding: 10px; }
        .menu-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; color: #333; }
        .menu-item:hover { background: #f0f0f0; color: var(--accent); }

        #ctx-desktop { position: absolute; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; z-index: 9999; padding: 5px; min-width: 160px; }


        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; background-color: #252526;
            min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 10002; border: 1px solid #444; padding: 5px 0;
        }
        .dropdown-content div { color: #ccc; padding: 8px 12px; text-decoration: none; display: block; font-size: 12px; cursor: pointer; }
        .dropdown-content div:hover { background-color: #094771; color: white; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content hr { border: 0; border-top: 1px solid #444; margin: 5px 0; }

    </style>
</head>
<body>

    <!-- 1. Login Screen -->
    <div id="login-screen" class="login-screen">
        <h2>WEB_OS Login</h2>
        <form onsubmit="event.preventDefault(); attemptLogin();" style="display:flex; flex-direction:column; align-items:center;">
            <input type="password" id="login-pass" placeholder="Password" style="padding:12px; border-radius:8px; border:none; width: 200px; text-align: center;">
            <button type="submit" style="margin-top:15px; padding:8px 30px; border-radius:20px; border:none; background:var(--accent); color:white; cursor:pointer;">Unlock</button>
        </form>
    </div>

    <!-- 2. Desktop Area (Cukup SATU saja) -->
    <div id="desktop" style="width: 100vw; height: calc(100vh - 50px); position: relative; background: url('https://images.unsplash.com') center/cover;" oncontextmenu="showDesktopCtx(event)">
        
        <!-- Start Menu (Pindah ke dalam desktop agar z-index aman) -->
        <div id="start-menu" style="position: absolute; bottom: 5px; left: 10px; width: 280px; background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); display: none; z-index: 10001; padding: 10px;">
            <div class="menu-item" onclick="openEditor('', 'Untitled.js'); toggleStartMenu()"> <i class="fas fa-file-code"></i> Text Editor  </div>
            <hr>
            <div class="menu-item" onclick="createNewExplorer(); toggleStartMenu()"><i class="fas fa-folder"></i> File Explorer</div>
            <div class="menu-item" onclick="openTerminal(); toggleStartMenu()"><i class="fas fa-terminal"></i> Terminal</div>
            <div class="menu-item" onclick="openQuickSettings(); toggleStartMenu()"><i class="fas fa-cog"></i> Settings</div>
            <hr>
            <div class="menu-item" onclick="saveCloudSession(); toggleStartMenu()"><i class="fas fa-cloud-upload-alt"></i> Hibernate</div>
            <div class="menu-item" onclick="location.reload()" style="color:red;"><i class="fas fa-power-off"></i> Power Off</div>
        </div>

        <!-- Desktop Context Menu -->
        <div id="ctx-desktop" style="position: absolute; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; z-index: 9999; padding: 5px; min-width: 160px;">
            <div class="menu-item" onclick="createNewExplorer()"><i class="fas fa-folder-plus"></i> New Explorer</div>
            <div class="menu-item" onclick="openTerminal()"><i class="fas fa-terminal"></i> Terminal</div>
        </div>

    </div>

    <!-- 3. Taskbar (Di luar desktop area) -->
    <div class="taskbar">
        <div class="start-btn" onclick="event.stopPropagation(); toggleStartMenu()">
            <i class="fab fa-windows"></i> Start
        </div>
        <div id="taskbar-apps" style="display:flex; flex:1; gap:10px; padding:0 15px;"></div>
        <div id="clock" onclick="openQuickSettings()" style="padding-right:20px; cursor:pointer; font-weight:bold; color:var(--text-main);">00:00</div>
    </div>

    <!-- Script tetep pake yang terakhir gue kirim, TAPI tambahin event.stopPropagation() di tombol start (cek kode di atas) -->
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzWhNSF2dr_uSExiUNz1QXa3GQoEC59HOl5ahkKt5tb739hOwEyitBJQkiSf1w48QYC/exec";
        const ROOT_ID = "1UhZoOSqtzhRALHy_LCchaDztPDkxs45B";
        const STORED_HASH = "3d9996762c9d4c321426951df2368b02cd5489074a671a0ddd0298aec8622a0e"; //webOS@ksc111981//HASH_SHA256_PASSWORD_KAMU
        
        let windowCount = 0;
        const editors = {};
        const MONACO_VER = "0.53.0"; 
        const MONACO_BASE = `https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/${MONACO_VER}/min/vs`;
        let isMonacoReady = false; // Flag status Monaco
        let isMonacoLoading = false; // Flag tambahan supaya tidak load berkali-kali
        let monacoQueue = [];      // Antrean fungsi jika belum ready  

        // Setup Environment (Anti vs/vs)
        window.MonacoEnvironment = {
            getWorkerUrl: function (workerId, label) {
                const code = `
                    self.MonacoEnvironment = { baseUrl: '${MONACO_BASE}' };
                    importScripts('${MONACO_BASE}/base/worker/workerMain.js');
                `;
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(code)}`;
            }
        };

        function loadMonacoCore(callback) {
            if (isMonacoReady) {
                if (callback) callback();
                return;
            }

            if (callback) monacoQueue.push(callback);
            if (isMonacoLoading) return;

            isMonacoLoading = true;

            // Tampilkan Progress Bar pakai Swal2
            Swal.fire({
                title: 'Memuat Editor...',
                html: 'Sedang mengunduh mesin Monaco (pendaratan modul)...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const script = document.createElement('script');
            script.src = `${MONACO_BASE}/loader.min.js`;
            
            script.onerror = () => {
                isMonacoLoading = false;
                Swal.fire("Gagal!", "Modul Monaco gagal mendarat. Cek koneksi.", "error");
            };

            script.onload = () => {
                // Fase 1: Loader mendarat, sekarang Fase 2: Inisialisasi Memori
                require.config({ paths: { 'vs': MONACO_BASE } });
                require(['vs/editor/editor.main'], function() {
                    isMonacoReady = true;
                    isMonacoLoading = false;
                    
                    // Tutup loading dan jalankan antrean
                    Swal.close(); 
                    while (monacoQueue.length > 0) {
                        const nextTask = monacoQueue.shift();
                        nextTask();
                    }
                });
            };
            document.head.appendChild(script);
        }

        async function sha256(str) {
            const buf = new TextEncoder().encode(str);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function attemptLogin() {
            const input = document.getElementById('login-pass').value;
            if (await sha256(input) === STORED_HASH) {
                document.getElementById('login-screen').style.display = 'none';
                sessionStorage.setItem("isAuth", "true");
                initOS();
            } else { alert("Akses Ditolak!"); }
        }

        function initOS() {
            updateClock(); setInterval(updateClock, 1000);
            restoreCloudSession();
        }

        function createNewExplorer(folderId = ROOT_ID, title = "Explorer") {
            windowCount++;
            const winId = `win-${windowCount}`;
            const appId = `app-${winId}`;
            const winHtml = `
                <div id="${winId}" class="sub-window" style="top:80px; left:80px;" onmousedown="focusWin('${winId}')">
                    <div class="win-header" onmousedown="dragWin(this.parentElement)">
                        <span>📁 ${title}</span>
                        <div class="win-controls">
                            <button onclick="toggleMinimize('${winId}')" title="Minimize" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-window-minimize"></i></button>
                            <button onclick="maximizeWin('${winId}')" title="Maximize" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-window-maximize"></i></button>
                            <button onclick="closeWin('${winId}')" title="Close" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                    <div class="win-body">
                        <iframe src="inner_explorer.html?folderId=${folderId}&pName=${encodeURIComponent(title)}" style="width:100%; height:100%; border:none;"></iframe>
                    </div>
                </div>`;
            document.getElementById('desktop').insertAdjacentHTML('beforeend', winHtml);
            addToTaskbar(winId, appId, title);
        }
        
        async function saveFileContent(winId, fileId) {
            if (!editors[winId]) return;
            const content = editors[winId].getValue(); // Ambil teks dari Monaco
            
            // LOGIKA EKSPLISIT: Jika file baru (tidak ada ID), paksa Save As
            if (!fileId || fileId === "" || fileId === "undefined") {
                saveFileAs(winId, fileId);
                return;
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "SAVE_FILE_CONTENT",
                        id: fileId,
                        content: content // Konten kodingan dibungkus di sini
                    })
                });
                
                const result = await response.json();
                if (result.status === "success") {
                    // UPDATE dataset agar sinkron dengan yang baru di-save
                    document.getElementById(winId).dataset.originalContent = content;
                    alert("Success! File saved to Cloud. ☁️");
                } else {
                    alert("Error: " + result.msg);
                }
            } catch (e) {
                console.error("Save Error:", e);
                alert("CORS or Network Error! Check Console.");
            }
        }


        function handleFileOpen(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (['js', 'html', 'css', 'txt', 'json'].includes(ext)) openEditor(file.id, file.name);
            else window.open(`https://drive.google.com{file.id}`);
        }

        function addToTaskbar(winId, appId, title) {
            const icon = `<div id="${appId}" onclick="focusWin('${winId}')" style="padding: 5px 10px; background: rgba(255,255,255,0.2); border-radius: 5px; cursor: pointer; font-size: 12px;"><i class="fas fa-folder"></i> ${title}</div>`;
            document.getElementById('taskbar-apps').insertAdjacentHTML('beforeend', icon);
        }

        function dragWin(el) {
            el.onmousedown = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                focusWin(el.id);
                document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'none');
                let p3 = e.clientX, p4 = e.clientY;
                document.onmousemove = (e) => {
                    el.style.top = (el.offsetTop - (p4 - e.clientY)) + "px";
                    el.style.left = (el.offsetLeft - (p3 - e.clientX)) + "px";
                    p3 = e.clientX; p4 = e.clientY;
                };
                document.onmouseup = () => {
                    document.onmousemove = null;
                    document.querySelectorAll('iframe').forEach(i => i.style.pointerEvents = 'auto');
                };
            };
        }

        function focusWin(id) {
            const win = document.getElementById(id);
            if (!win) return;

            // 1. Jika jendela sedang disembunyikan (minimized), tampilkan dulu
            if (win.style.display === 'none') {
                win.style.display = 'flex';
            }

            // 2. Naikkan z-index paling depan
            document.querySelectorAll('.sub-window').forEach(w => w.style.zIndex = "10");
            win.style.zIndex = "1000"; // Pastikan lebih tinggi dari menu

            // 3. Khusus Monaco: Update layout kalau ukurannya berubah
            if (editors[id]) {
                setTimeout(() => editors[id].layout(), 10);
            }
        }

        /*
        function focusWin(id) {
            document.querySelectorAll('.sub-window').forEach(w => w.style.zIndex = "10");
            document.getElementById(id).style.zIndex = "100";
        }
        */
        /*
        function closeWin(id, appId) {
            document.getElementById(id).remove();
            document.getElementById(appId).remove();
        } */

        function closeWin(winId) {
            const win = document.getElementById(winId);
            if (!win) return;

            // 1. LOGIKA SAFETY (Hanya jika ini jendela Editor/Monaco)
            if (editors[winId]) {
                const currentContent = editors[winId].getValue();
                const originalContent = win.dataset.originalContent || "";

                if (currentContent !== originalContent) {
                    if (!confirm("Ada perubahan yang belum disimpan di editor ini. Yakin mau tutup?")) {
                        return; // Batal tutup
                    }
                }
                // Bersihkan memory Monaco
                editors[winId].dispose();
                delete editors[winId];
            }

            // 2. HAPUS ELEMEN JENDELA
            win.remove();

            // 3. HAPUS ICON DI TASKBAR
            // Explorer pakai format 'app-win-1', Editor pakai 'app-edit-12345'
            // Kita cari element yang ID-nya mengandung winId
            const appId = `app-${winId}`; 
            const taskIcon = document.getElementById(appId);
            if (taskIcon) taskIcon.remove();
        }

        // Supaya tombol lama di HTML Editor (yang manggil closeEditor) nggak error:
        function closeEditor(winId) {
            closeWin(winId);
        }


        /*
        function toggleMinimize(winId) {
            const win = document.getElementById(winId);
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
            const appId = `app-${winId}`;
            document.getElementById(appId).classList.toggle('active');
         } */

         function toggleMinimize(winId) {
            const win = document.getElementById(winId);
            if (!win) return;
            
            if (win.style.display === 'none') {
                win.style.display = 'flex';
                focusWin(winId); // Otomatis bawa ke depan saat dibuka lagi
            } else {
                win.style.display = 'none';
            }
        }

        // Editor manggil ini, arahkan ke fungsi yang sama agar konsisten
        function minimizeWin(winId) {
            toggleMinimize(winId);
        }




        function toggleStartMenu() {
            const m = document.getElementById('start-menu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function showDesktopCtx(e) {
            e.preventDefault();
            const m = document.getElementById('ctx-desktop');
            m.style.display = 'block'; m.style.left = e.pageX + 'px'; m.style.top = e.pageY + 'px';
        }

        async function saveCloudSession() {
            const windows = [];
            document.querySelectorAll('.sub-window').forEach(win => {
                const iframe = win.querySelector('iframe');
                if (iframe) {
                    const url = new URL(iframe.src);
                    windows.push({ top: win.style.top, left: win.style.left, title: url.searchParams.get('pName'), folderId: url.searchParams.get('folderId') });
                }
            });
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "SAVE_SESSION", data: windows }) });
            alert("Hibernated!");
        }

        async function restoreCloudSession() {
            const res = await fetch(`${GAS_URL}?action=GET_SESSION`);
            const windows = await res.json();
            if (Array.isArray(windows)) windows.forEach(w => createNewExplorer(w.folderId, w.title));
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        window.onclick = () => {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('ctx-desktop').style.display = 'none';
        }

        window.addEventListener('keydown', async (e) => {
            // Alt + I untuk "Instant Code File"
            if (e.altKey && e.key === 'i') {
                const fileName = prompt("Nama file baru (contoh: script.js):");
                if (!fileName) return;

                // 1. Buat file kosong dulu di Drive
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "UPSERT_FILE",
                        name: fileName,
                        mimeType: "text/plain",
                        base64: "", 
                        folderId: ROOT_ID 
                    })
                });
                
                // 2. Jika sukses, langsung cari file tersebut dan buka Editor
                // (Tips: Sebaiknya GAS mengembalikan ID file baru agar langsung bisa dibuka)
                alert("File created! Silakan buka lewat Explorer untuk mengedit.");
                // Atau panggil openEditor jika kamu punya ID-nya
            }
        });

        function triggerEditorCmd(winId, actionId) {
            const editor = editors[winId];
            if (editor) {
                editor.focus();
                editor.trigger('menu', actionId);
            }
        }

        // OS Level Maximize
        function maximizeWin(id) {
            const win = document.getElementById(id);
            if (win.style.width === "100vw") {
                win.style.width = "850px"; win.style.height = "600px"; win.style.top = "60px"; win.style.left = "120px";
            } else {
                win.style.width = "100vw"; win.style.height = "calc(100vh - 50px)"; win.style.top = "0"; win.style.left = "0";
            }
            // Resize Monaco immediately
            if (editors[id]) editors[id].layout();
        }



        // 1. KONFIGURASI GLOBAL (Ganti versi di sini saja)

        function openEditor(fileId, fileName) {
            // Fungsi internal untuk membuat jendela (Task)
            const createTask = () => {
                // Cek apakah monaco sudah mendarat di memory RAM
                if (typeof monaco === "undefined") {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Memory Belum Siap',
                        text: 'Mesin baru saja mendarat. Silakan klik ulang sekali lagi.',
                        timer: 2000
                    });
                    return;
                }

                const winId = `edit-${Date.now()}`;
                const appId = `app-${winId}`;

                // KODE LENGKAP WINDOW (Header + Menu Bar + Body)
                const winHtml = `
                    <div id="${winId}" class="sub-window" 
                        style="width:850px; height:600px; top:60px; left:120px; z-index:1000; display: flex; flex-direction: column; background: #1e1e1e; border: 1px solid #444; resize: both; overflow: hidden;" 
                        onmousedown="focusWin('${winId}')">
                        
                        <!-- 1. HEADER (TETAP) -->
                        <div class="win-header" style="height: 35px; background: #333; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; cursor: move;" onmousedown="dragWin(this.parentElement)">
                            <span>📝 ${fileName}</span>
                            <div class="win-controls">
                                <button onclick="toggleMinimize('${winId}')" title="Minimize" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-window-minimize"></i></button>
                                <button onclick="maximizeWin('${winId}')" title="Maximize" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-window-maximize"></i></button>
                                <button onclick="closeWin('${winId}')" title="Close" style="color:white; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>

                        <!-- 2. MENU BAR LENGKAP (TETAP) -->
                        <div class="editor-menubar" style="background: #252526; display: flex; padding: 5px 10px; gap: 15px; border-bottom: 1px solid #333;">
                            <div class="dropdown">
                                <span style="color:#ccc; cursor:pointer; font-size:12px;">File</span>
                                <div class="dropdown-content">
                                    <div onclick="saveFileContent('${winId}', '${fileId}')">Save (Ctrl+S)</div>
                                    <div onclick="saveFileAs('${winId}', '${fileId}')">Save As...</div>
                                </div>
                            </div>
                            <div class="dropdown">
                                <span style="color:#ccc; cursor:pointer; font-size:12px;">Edit</span>
                                <div class="dropdown-content">
                                    <div onclick="triggerEditorCmd('${winId}', 'editor.action.clipboardUndoAction')">Undo</div>
                                    <div onclick="triggerEditorCmd('${winId}', 'editor.action.clipboardRedoAction')">Redo</div>
                                    <hr style="border:0; border-top:1px solid #444; margin:5px 0;">
                                    <div onclick="triggerEditorCmd('${winId}', 'actions.find')">Find (Ctrl+F)</div>
                                    <div onclick="triggerEditorCmd('${winId}', 'editor.action.startFindReplaceAction')">Replace (Ctrl+H)</div>
                                </div>
                            </div>
                            <div class="dropdown">
                                <span style="color:#ccc; cursor:pointer; font-size:12px;">Selection</span>
                                <div class="dropdown-content">
                                    <div onclick="triggerEditorCmd('${winId}', 'editor.action.selectAll')">Select All</div>
                                    <div onclick="triggerEditorCmd('${winId}', 'editor.action.copyLinesDownAction')">Copy Line Down</div>
                                </div>
                            </div>
                            <div class="dropdown">
                                <span style="color:#ccc; cursor:pointer; font-size:12px;">View</span>
                                <div class="dropdown-content">
                                    <div onclick="triggerEditorCmd('${winId}', 'editor.action.quickCommand')">Command Palette (F1)</div>
                                </div>
                            </div>
                        </div>

                        <!-- 3. MONACO CONTAINER (TETAP) -->
                        <div class="win-body" style="flex: 1; position: relative; overflow: hidden;">
                            <div id="container-${winId}" style="width:100%; height:100%;"></div>
                        </div>

                        <!-- 4. RESIZER HANDLE (TETAP) -->
                        <div style="position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, #444 50%);"></div>
                    </div>`;

                // Masukkan ke Desktop
                document.getElementById('desktop').insertAdjacentHTML('beforeend', winHtml);
                
                // Daftarkan ke Taskbar
                addToTaskbar(winId, appId, fileName);
                
                // Inisialisasi isi Monaco
                initMonacoInWin(winId, fileId, fileName);
            };

            // Panggil mesin landing sebelum eksekusi createTask
            loadMonacoCore(createTask);
        }


        function initMonacoInWin(winId, fileId, fileName) {
            require(['vs/editor/editor.main'], async function() {
                try {
                    let finalContent = ""; 

                    // LOGIKA EKSPLISIT: Cek apakah buka file eksis atau file baru
                    if (fileId && fileId !== "") {
                        // Ambil data dari Google Apps Script
                        const res = await fetch(`${GAS_URL}?action=READ_FILE&id=${fileId}`);
                        const data = await res.json();
                        
                        if (data && data.content !== undefined) {
                            finalContent = data.content;
                        } else {
                            finalContent = "// Gagal mengambil konten file.";
                        }
                    } else {
                        // File baru dari Start Menu, biarkan kosong
                        finalContent = ""; 
                    }

                    const ext = fileName.split('.').pop().toLowerCase();
                    const langMap = { 'js': 'javascript', 'html': 'html', 'css': 'css', 'json': 'json', 'py': 'python', 'txt': 'plaintext' };

                    // BAGIAN INI TETAP (Settingan Monaco lo yang lengkap)
                    editors[winId] = monaco.editor.create(document.getElementById(`container-${winId}`), {
                        value: finalContent,
                        language: langMap[ext] || 'plaintext',
                        theme: 'vs-dark',
                        automaticLayout: true,
                        fontSize: 14,
                        fixedOverflowWidgets: true, 
                        minimap: { enabled: false },
                        scrollBeyondLastLine: false
                    });

                    // BAGIAN INI TETAP
                    addEditorShortcuts(winId, fileId);
                    document.getElementById(winId).dataset.originalContent = finalContent;

                } catch (err) {
                    // CATCH HANYA UNTUK HANDLE ERROR (Network/Server Error)
                    console.error("Critical Error pada initMonaco:", err);
                    alert("Terjadi kesalahan sistem saat memuat editor.");
                }
            });
        }

            if (!editors[winId]) return;
            const content = editors[winId].getValue();           

            //const oldName = document.querySelector(`#${winId} .win-header span`).innerText.replace('📝 Editor: ', '');

            // Ambil nama dari header secara aman
            const headerSpan = document.querySelector(`#${winId} .win-header span`);
            const currentName = headerSpan ? headerSpan.innerText.replace('📝 ', '') : "new_file.js";
            
            const newName = prompt("Simpan sebagai (Nama File Baru):", "copy_of_" + oldName);
            if (!newName) return;

            try {
                // Jika fileId kosong (file baru), kita gunakan aksi UPSERT_FILE di GAS
                const actionType = (fileId && fileId !== "") ? "COPY_FILE" : "UPSERT_FILE";
                const payload = {
                    action: actionType,
                    id: fileId,
                    newName: newName, // Untuk COPY_FILE
                    name: newName,    // Untuk UPSERT_FILE
                    content: content,
                    base64: btoa(content), // GAS UPSERT butuh base64
                    mimeType: "text/plain",
                    folderId: ROOT_ID
                    };

                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "COPY_FILE", id: fileId, newName: newName, content: content })
                });

                }
            } catch (e) { alert("Gagal menyimpan file baru!"); }
        }

        // 2. Fungsi Keyboard Shortcut Ctrl+S (Internal Monaco)
        function addEditorShortcuts(winId, fileId) {
            const editor = editors[winId];
            
            // Gunakan API Monaco untuk menangkap Ctrl+S (Command + S di Mac)
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                saveFileContent(winId, fileId);
            });
        }
