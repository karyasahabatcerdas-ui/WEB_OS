<!DOCTYPE html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>WEB_OS | Private Cloud Desktop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- FontAwesome & SweetAlert2 Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.css" integrity="sha512-Ivy7sPrd6LPp20adiK3al16GBelPtqswhJnyXuha3kGtmQ1G2qWpjuipfVDaZUwH26b3RDe8x707asEpvxl7iA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js" integrity="sha512-pnPZhx5S+z5FSVwy62gcyG2Mun8h6R+PG01MidzU+NGF06/ytcm2r6+AaWMBXAnDHsdHWtsxS0dH8FBKA84FlQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        /* 1. VARIABLE SYSTEM (THEMING) */
        :root { 
            --bg-panel: rgba(30, 30, 30, 0.85); --text-main: #f0f0f0; --accent: #007bff; --border: rgba(255,255,255,0.1); 
            --swal-bg: #1e1e1e; --swal-text: #f0f0f0; --swal-confirm: #007bff;
        }
        body.theme-light { 
            --bg-panel: rgba(240, 240, 240, 0.9); --text-main: #333; --accent: #0056b3; --border: rgba(0,0,0,0.1); 
            --swal-bg: #ffffff; --swal-text: #333333; --swal-confirm: #0056b3;
        }
        body.theme-bluedark { 
            --bg-panel: rgba(10, 25, 47, 0.9); --text-main: #64ffda; --accent: #00bcd4; --border: rgba(100, 255, 218, 0.2); 
            --swal-bg: #0a192f; --swal-text: #64ffda; --swal-confirm: #00bcd4;
        }
        body.theme-greendark { 
            --bg-panel: rgba(26, 31, 26, 0.9); --text-main: #a8d5a2; --accent: #2ecc71; --border: rgba(46, 204, 113, 0.2); 
            --swal-bg: #1a1f1a; --swal-text: #a8d5a2; --swal-confirm: #2ecc71;
        }

        /* 2. GLOBAL & LAYOUT */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #desktop { width: 100vw; height: calc(100vh - 50px); background: url('https://images.unsplash.com') center/cover; position: relative; }      
        
        /* 3. TASKBAR */
        .taskbar { 
            height: 50px; background: var(--bg-panel); color: var(--text-main); border-top: 1px solid var(--border); 
            backdrop-filter: blur(15px); position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; z-index: 10000;
        }
        .start-btn { cursor: pointer; padding: 0 20px; height: 100%; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--accent); }
        .start-btn:hover { background: rgba(0,0,0,0.1); }

        /* 4. WINDOW SYSTEM */
        .sub-window { 
            position: absolute; width: 600px; height: 400px; background: var(--bg-panel); border: 1px solid var(--border);
            backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; overflow: hidden; z-index: 10; min-width: 300px; min-height: 200px; 
        } 
        .win-header { background: var(--bg-panel); color: var(--text-main); border-bottom: 1px solid var(--border); padding: 10px 15px; cursor: move; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .win-body { flex: 1; overflow: hidden; background: white; }        
        .win-controls button { background: none; border: none; cursor: pointer; padding: 5px; color: var(--text-main); }
        body.theme-dark .win-body, body.theme-bluedark .win-body, body.theme-greendark .win-body { background: #1e1e1e; }

        /* 5. SWEETALERT2 CUSTOM THEME */
        .swal2-popup { background: var(--swal-bg) !important; color: var(--swal-text) !important; border: 1px solid var(--border) !important; border-radius: 15px !important; }
        .swal2-title, .swal2-html-container { color: var(--swal-text) !important; }
        .swal2-confirm { background-color: var(--swal-confirm) !important; }
        .swal2-container { z-index: 999999 !important; }

        /* 6. PROGRESS BAR CHUNKING */
        .chunk-progress-bg { width: 100%; height: 12px; background: rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .chunk-progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }

        /* 7. DESKTOP COMPONENTS */
        .login-screen { position: fixed; inset: 0; background: #051b5a; z-index: 20000; display: flex; align-items: center; justify-content: center; color: white; flex-direction: column; }
        #start-menu { position: absolute; bottom: 55px; left: 10px; width: 280px; background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); display: none; z-index: 10001; padding: 10px; }
        .menu-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; color: #333; }
        .menu-item:hover { background: #f0f0f0; color: var(--accent); }
    </style>
</head>
<body>

<div id="desktop"></div>

<div class="taskbar">
    <div class="start-btn" onclick="toggleStartMenu()">
        <i class="fab fa-windows"></i> <span>Start</span>
    </div>
    <div id="taskbar-apps" style="display:flex; flex:1; gap:10px; padding:0 15px;"></div>
    <div id="tray-area" style="padding-right:20px; font-size:13px; font-weight:500;">
        <span id="os-clock">00:00</span>
    </div>
</div>

<script>
/* ============================================================
   GLOBAL SYSTEM VARIABLES & CONFIGURATION
   ============================================================ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbx2iUTl3jKJQ2uJ5huTjUUz230IIV16Jnvy1qlD5oWCxOrmoYJ7tTVnXkSu96V_bGjt/exec";
const ROOT_ID = "1UhZoOSqtzhRALHy_LCchaDztPDkxs45B";

// MONACO EDITOR CONFIG (Local Path)
const MONACO_VER = "0.53.0"; 
const MONACO_BASE = `./monaco-editor-0.55.1/package/min/vs`;

let windowCount = 0;
const editors = {};       // Menyimpan instance Monaco
let isMonacoReady = false; 
let isMonacoLoading = false;
let monacoQueue = [];      // Antrean jika Monaco belum siap

/* ============================================================
   UNIVERSAL SMART FETCH (CHUNK & PROGRESS ENGINE)
   ============================================================ */
async function smartFetch(payload, targetData = null) {
    const uuid = localStorage.getItem("webos_uuid");
    const streamId = Date.now();
    const chunkSize = 50000; // 50KB

    // 1. JIKA DATA KECIL
    if (!targetData || targetData.length <= chunkSize) {
        const response = await fetch(GAS_URL, { 
            method: "POST", 
            body: JSON.stringify({ ...payload, uuid, fullData: targetData }) 
        });
        return await response.json();
    }

    // 2. JIKA DATA BESAR (PROSES CHUNKING)
    const totalChunks = Math.ceil(targetData.length / chunkSize);
    let finalResult = null;

    // Tampilkan Swal2 dengan Progress Bar yang sesuai Tema
    Swal.fire({
        title: 'Syncing with Cloud...',
        html: `
            <div id="swal-status" style="font-size:12px; margin-bottom:8px;">Preparing data...</div>
            <div class="chunk-progress-bg">
                <div id="swal-bar" class="chunk-progress-bar"></div>
            </div>
            <div id="swal-pct" style="margin-top:8px; font-weight:bold; font-size:14px;">0%</div>
        `,
        showConfirmButton: false,
        allowOutsideClick: false
    });

    for (let i = 0; i < totalChunks; i++) {
        const isFinal = (i === totalChunks - 1);
        const chunk = targetData.slice(i * chunkSize, (i + 1) * chunkSize);

        const chunkPayload = {
            ...payload, isChunk: true, isFinal: isFinal,
            streamId: streamId, uuid: uuid, chunk: chunk
        };

        const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(chunkPayload) });
        finalResult = await response.json();

        // Update UI Progress secara Real-Time
        const percent = Math.round(((i + 1) / totalChunks) * 100);
        const bar = document.getElementById('swal-bar');
        const pct = document.getElementById('swal-pct');
        const txt = document.getElementById('swal-status');

        if (bar) bar.style.width = percent + "%";
        if (pct) pct.innerText = percent + "%";
        if (txt) txt.innerText = `Transferring: ${i + 1} of ${totalChunks} parts...`;

        if (finalResult.status === "error") throw new Error(finalResult.msg);
    }
    
    Swal.close();
    return finalResult;
}

// Lanjut ke Bagian 3...

// 3. UTILS: SHA-256 Hashing untuk Password
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// 4. DESKTOP MANAGER (Mulai merender icon desktop)
const OS = {
    user: {
        uuid: localStorage.getItem("webos_uuid"),
        name: sessionStorage.getItem("userName") || "User"
    },
    // Fungsi Notifikasi Global
    notify: (title, msg, type = 'info') => {
        Swal.fire({ title, text: msg, icon: type, timer: 2000, showConfirmButton: false });
    },
    // Menjalankan App
    openApp: (id, name, url) => {
        // Logika Window Manager akan ada di Bagian 3
        console.log(`Membuka: ${name}`);
        createWindow(id, name, url);
    }
};
/* ============================================================
   WINDOW MANAGEMENT & SETTINGS HANDLER
   ============================================================ */

// 1. FUNGSI MEMBUAT JENDELA (createWindow)
function createWindow(id, title, url) {
    if (document.getElementById(`win-${id}`)) {
        bringToFront(id);
        return;
    }

    const win = document.createElement('div');
    win.id = `win-${id}`;
    win.className = 'window';
    win.style.width = '600px'; win.style.height = '400px';
    win.style.top = '100px'; win.style.left = '150px';

    win.innerHTML = `
        <div class="win-header" onmousedown="dragWindow(event, '${id}')">
            <span class="win-title">${title}</span>
            <div class="win-controls">
                <span class="win-ctrl" onclick="closeWindow('${id}')"><i class="fas fa-times"></i></span>
            </div>
        </div>
        <div class="win-body">
            <iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    `;

    document.getElementById('desktop').appendChild(win);
    bringToFront(id);
}

function closeWindow(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) win.remove();
}

function bringToFront(id) {
    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 100);
    const target = document.getElementById(`win-${id}`);
    if (target) target.style.zIndex = 200;
}

// 2. FUNGSI DRAG WINDOW (Sederhana)
function dragWindow(e, id) {
    const win = document.getElementById(`win-${id}`);
    let pos1 = 0, pos2 = 0, pos3 = e.clientX, pos4 = e.clientY;
    
    document.onmousemove = (ev) => {
        pos1 = pos3 - ev.clientX; pos2 = pos4 - ev.clientY;
        pos3 = ev.clientX; pos4 = ev.clientY;
        win.style.top = (win.offsetTop - pos2) + "px";
        win.style.left = (win.offsetLeft - pos1) + "px";
    };
    
    document.onmouseup = () => {
        document.onmousemove = null;
        document.onmouseup = null;
    };
}

// 3. FUNGSI SAVE SETTINGS (INTI SINKRONISASI)
async function saveAllSettings() {
    const avatarImg = document.getElementById('preview-avatar').src;
    const bgBox = document.getElementById('preview-bg-box');
    const bgRaw = bgBox ? bgBox.style.backgroundImage : "";
    let cleanBg = bgRaw.includes("data:image") ? bgRaw.replace(/^url\(["']?/, '').replace(/["']?\)$/, '') : null;

    try {
        // TAHAP 1: KIRIM AVATAR (Jika Base64 Baru)
        if (avatarImg.startsWith("data:image")) {
            await smartFetch({ action: "UPDATE_PROFILE", target: "avatar" }, avatarImg);
        }

        // TAHAP 2: KIRIM WALLPAPER (Jika Base64 Baru)
        if (cleanBg) {
            await smartFetch({ action: "UPDATE_PROFILE", target: "bg" }, cleanBg);
        }

        // TAHAP 3: FINAL PUSH (Kirim sisa settings & trigger simpan di GAS)
        const payload = {
            action: "UPDATE_PROFILE",
            uuid: localStorage.getItem("webos_uuid"),
            isDataComplete: true, // Beritahu GAS data sudah kumpul
            username: !document.getElementById('chk-user').checked ? document.getElementById('set-username').value : null,
            password: !document.getElementById('chk-pass').checked ? await sha256(document.getElementById('set-password').value) : null,
            theme: document.getElementById('set-win-theme').value,
            region: document.getElementById('set-region').value,
            bgColor: document.getElementById('set-bg-color').value,
            bgMode: document.getElementById('set-bg-mode').value
        };

        const finalRes = await smartFetch(payload);
        
        if (finalRes.status === "success") {
            OS.notify("Berhasil", "Profil & Cloud Desktop diperbarui!", "success");
            setTimeout(() => location.reload(), 1500);
        }
    } catch (err) {
        Swal.fire("Gagal Sinkron", err.message, "error");
    }
}
/* ============================================================
   DESKTOP RENDERER & SYSTEM INITIALIZATION
   ============================================================ */

// 1. FUNGSI RENDER DESKTOP (Icons)
function renderDesktop() {
    const desktop = document.getElementById('desktop');
    const apps = [
        { id: 'explorer', name: 'File Explorer', icon: 'fa-folder-open', url: 'inner_explorer.html' },
        { id: 'settings', name: 'Settings', icon: 'fa-cog', url: 'inner_settings.html' },
        { id: 'terminal', name: 'Terminal', icon: 'fa-terminal', url: 'inner_terminal.html' }
    ];

    desktop.innerHTML = '';
    apps.forEach(app => {
        const icon = document.createElement('div');
        icon.className = 'dsktp-icon';
        icon.innerHTML = `<i class="fas ${app.icon}"></i><span>${app.name}</span>`;
        icon.onclick = () => createWindow(app.id, app.name, app.url);
        desktop.appendChild(icon);
    });
}

// 2. SISTEM JAM (Clock)
function updateClock() {
    const clock = document.getElementById('clock');
    const now = new Date();
    const timeStr = now.toLocaleTimeString('id-ID', { 
        hour: '2-digit', minute: '2-digit', hour12: false 
    });
    if (clock) clock.innerText = timeStr;
}
setInterval(updateClock, 1000);

// 3. INISIALISASI SISTEM (Load Session & Settings)
async function initOS() {
    updateClock();
    renderDesktop();

    // Ambil UUID dari LocalStorage
    const uuid = localStorage.getItem("webos_uuid");
    if (!uuid) {
        Swal.fire('Sesi Berakhir', 'Silakan login kembali.', 'warning')
            .then(() => window.location.href = 'login.html');
        return;
    }

    // Terapkan Wallpaper & Tema dari LocalStorage (jika ada)
    const savedBg = localStorage.getItem("desktopBg");
    const savedColor = localStorage.getItem("desktopBgColor");
    const savedMode = localStorage.getItem("desktopBgMode");

    if (savedBg) {
        document.body.style.backgroundImage = `url('${savedBg}')`;
        document.body.style.backgroundSize = savedMode || 'cover';
    } else if (savedColor) {
        document.body.style.backgroundColor = savedColor;
    }

    console.log("WEB_OS System Ready.");
}

// 4. EVENT LISTENERS
//document.getElementById('start-trigger').onclick = () => {
    //OS.notify("Start Menu", "Fitur ini akan segera hadir!", "info");
//};

// Jalankan Inisialisasi saat window dimuat
window.onload = initOS;

</script>
</body>
