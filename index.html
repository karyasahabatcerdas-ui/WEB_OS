<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-OS | Private Cloud Desktop</title>
    <style>
        :root {
            /* Default Light Theme */
            --bg-desktop: url('https://images.unsplash.com');
            --bg-panel: rgba(255, 255, 255, 0.7);
            --text-main: #333;
            --accent: #007bff;
            --border: rgba(0,0,0,0.1);
            --win-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Theme Presets */
        [data-theme="dark"] {
            --bg-desktop: #1a1a1a; --bg-panel: rgba(30, 30, 30, 0.85); --text-main: #f0f0f0; --border: rgba(255,255,255,0.1);
        }
        [data-theme="blue-dark"] {
            --bg-desktop: #0a192f; --bg-panel: rgba(16, 33, 65, 0.9); --text-main: #64ffda; --accent: #00d2ff; --border: rgba(100, 255, 218, 0.2);
        }
        [data-theme="green-dark"] {
            --bg-desktop: #0d1a0d; --bg-panel: rgba(20, 40, 20, 0.9); --text-main: #00ff41; --accent: #2ecc71; --border: rgba(0, 255, 65, 0.2);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* Desktop Area */
        #desktop {
            width: 100vw; height: calc(100vh - 50px);
            background: var(--bg-desktop) center/cover no-repeat;
            position: relative;
        }

        /* Taskbar */
        .taskbar {
            height: 50px; background: var(--bg-panel); backdrop-filter: blur(15px);
            position: fixed; bottom: 0; width: 100%; display: flex;
            justify-content: space-between; align-items: center; z-index: 10000;
            border-top: 1px solid var(--border);
        }
        .taskbar-left, .taskbar-right { display: flex; align-items: center; padding: 0 15px; }
        .start-btn { cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: 0.2s; }
        .start-btn:hover { background: rgba(255,255,255,0.2); }

        /* Windows System */
        .sub-window {
            position: absolute; width: 600px; height: 400px;
            background: var(--bg-panel); backdrop-filter: blur(20px);
            border-radius: 12px; box-shadow: var(--win-shadow);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border); min-width: 300px; min-height: 200px;
            resize: both; z-index: 10;
        }
        .win-header {
            padding: 10px 15px; background: rgba(0,0,0,0.05); cursor: move;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-main); font-weight: 600; font-size: 14px;
        }
        .win-controls button {
            background: none; border: none; color: var(--text-main);
            margin-left: 10px; cursor: pointer; font-size: 16px; opacity: 0.7;
        }
        .win-body { flex: 1; overflow: hidden; position: relative; }

        /* Snap Preview */
        #snap-preview {
            display: none; position: absolute; background: rgba(0,123,255,0.2);
            border: 2px solid var(--accent); z-index: 9999; pointer-events: none;
        }

        /* Modals & Overlays */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 20000;
        }
    </style>
</head>
<body data-theme="light">

    <div id="desktop">
        <!-- Windows will be injected here -->
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="taskbar-left">
            <div class="start-btn" onclick="toggleStartMenu()">
                <img src="https://img.icons8.com" alt="Start">
            </div>
            <div id="taskbar-apps" style="display:flex; margin-left:15px; gap:8px;"></div>
        </div>
        <div class="taskbar-right">
            <div id="clock-tray" style="text-align:right; cursor:pointer; color:var(--text-main); font-size:12px;">
                <div id="time-val" style="font-weight:bold;">00:00</div>
                <div id="date-val">01 Jan 2024</div>
            </div>
        </div>
    </div>

    <!-- Snap Indicator -->
    <div id="snap-preview"></div>

    <!-- Lanjut ke bagian script di pesan berikutnya... -->
     <script>
    let windowCount = 0;
    let currentFolderId = "ID_FOLDER_ROOT_KAMU"; // GANTI DENGAN ID DRIVE KAMU
    const GAS_URL = "URL_WEB_APP_GAS_KAMU"; // GANTI DENGAN URL GAS KAMU

    // 1. Fungsi Membuat Jendela Baru (Multi-Window)
    function createNewExplorer(targetId = currentFolderId, title = "Explorer") {
        windowCount++;
        const winId = `win-${windowCount}`;
        const appId = `app-${winId}`;

        const winHtml = `
            <div id="${winId}" class="sub-window" style="top:50px; left:50px;" onmousedown="focusWindow(this)">
                <div class="win-header" onmousedown="dragElement(this.parentElement)">
                    <span>📁 ${title}</span>
                    <div class="win-controls">
                        <button onclick="toggleMinimize('${winId}')">_</button>
                        <button onclick="closeWindow('${winId}', '${appId}')">×</button>
                    </div>
                </div>
                <div class="win-body">
                    <iframe src="inner_explorer.html?folderId=${targetId}" style="width:100%; height:100%; border:none;"></iframe>
                </div>
            </div>`;
        
        document.getElementById('desktop').insertAdjacentHTML('beforeend', winHtml);
        addToTaskbar(winId, appId, title);
    }

    // 2. Logika Drag & Aero Snap (Windows 11 Style)
    function dragElement(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const snapPreview = document.getElementById('snap-preview');
        
        elmnt.onmousedown = (e) => {
            if (e.target.tagName === 'BUTTON') return;
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDrag;
            document.onmousemove = elementDrag;
        };

        function elementDrag(e) {
            pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
            pos3 = e.clientX; pos4 = e.clientY;
            
            let newTop = elmnt.offsetTop - pos2;
            let newLeft = elmnt.offsetLeft - pos1;
            
            elmnt.style.top = newTop + "px";
            elmnt.style.left = newLeft + "px";

            // Snap Detection
            const threshold = 25;
            const wWidth = window.innerWidth;
            const wHeight = window.innerHeight - 50;

            if (e.clientY < threshold) showSnap(0, 0, wWidth, wHeight); // Maximize
            else if (e.clientX < threshold) showSnap(0, 0, wWidth / 2, wHeight); // Left
            else if (e.clientX > wWidth - threshold) showSnap(wWidth / 2, 0, wWidth / 2, wHeight); // Right
            else snapPreview.style.display = 'none';
        }

        function showSnap(x, y, w, h) {
            snapPreview.style.display = 'block';
            snapPreview.style.left = x + 'px'; snapPreview.style.top = y + 'px';
            snapPreview.style.width = w + 'px'; snapPreview.style.height = h + 'px';
        }

        function closeDrag(e) {
            if (snapPreview.style.display === 'block') {
                elmnt.style.left = snapPreview.style.left;
                elmnt.style.top = snapPreview.style.top;
                elmnt.style.width = snapPreview.style.width;
                elmnt.style.height = snapPreview.style.height;
                snapPreview.style.display = 'none';
            }
            document.onmouseup = null; document.onmousemove = null;
        }
    }

    // 3. Taskbar & Focus Logic
    function addToTaskbar(winId, appId, title) {
        const icon = `<div id="${appId}" class="task-btn active" onclick="toggleMinimize('${winId}')">📁</div>`;
        document.getElementById('taskbar-apps').insertAdjacentHTML('beforeend', icon);
    }

    function focusWindow(win) {
        document.querySelectorAll('.sub-window').forEach(w => w.style.zIndex = "10");
        win.style.zIndex = "100";
    }

    function toggleMinimize(winId) {
        const win = document.getElementById(winId);
        win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        const appId = `app-${winId}`;
        document.getElementById(appId).classList.toggle('active');
    }

    function closeWindow(winId, appId) {
        document.getElementById(winId).remove();
        document.getElementById(appId).remove();
    }

    // 4. Global Shortcuts (Hacker Mode)
    window.addEventListener('keydown', (e) => {
        if (e.altKey && e.key === 'n') createNewExplorer(); // New Window
        if (e.altKey && e.key === 't') openTerminal(); // Terminal
        if (e.altKey && e.key === 'p') openQuickSettings(); // Settings
        if (e.altKey && e.key === 'l') lockOS(); // Lock
        if (e.altKey && e.key === '/') toggleShortcutHub(); // Help
        if (e.ctrlKey && e.shiftKey && e.key === 'Escape') toggleTaskManager(); // Task Manager
    });

    // 5. Clock Update
    setInterval(() => {
        const now = new Date();
        document.getElementById('time-val').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date-val').innerText = now.toLocaleDateString('id-ID', {day:'numeric', month:'short'});
    }, 1000);






    // Ganti dengan hasil hash SHA-256 password pilihanmu
const STORED_HASH = "HASIL_HASH_SHA256_KAMU_DI_SINI"; 

async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin() {
    const input = document.getElementById('login-pass').value;
    const hash = await sha256(input);
    if (hash === STORED_HASH) {
        sessionStorage.setItem("isAuth", "true");
        document.getElementById('login-screen').style.display = 'none';
        // Auto-restore session dari Cloud setelah login
        restoreCloudSession();
    } else {
        alert("Password Salah!");
    }
}


function openHelp() {
    // Membuka jendela khusus yang memanggil readme_ui.html
    const winId = `help-${Date.now()}`;
    const winHtml = `
        <div id="${winId}" class="sub-window" style="width:800px; height:550px; top:50px; left:100px;">
            <div class="win-header" onmousedown="dragElement(this.parentElement)">
                <span>📖 User Manual & Documentation</span>
                <div class="win-controls">
                    <button onclick="this.closest('.sub-window').remove()">×</button>
                </div>
            </div>
            <div class="win-body">
                <iframe src="readme_ui.html" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>`;
    document.getElementById('desktop').insertAdjacentHTML('beforeend', winHtml);
}


async function executeCmd(input) {
    const args = input.split(' ');
    const cmd = args[0].toLowerCase();
    
    switch(cmd) {
        case 'ls': 
            const data = await fetch(`${GAS_URL}?action=GET_TREE&folderId=${currentFolderId}`);
            // Tampilkan list file ke terminal output
            break;
        case 'rm':
            await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'MOVE_TO_TRASH', id: args[1]})});
            printToTerminal("File moved to trash.");
            break;
        // Dan seterusnya...
        // Tambahkan di dalam switch(cmd) fungsi terminal client-side
        case 'theme':
            const themeName = args[0]; // misal: theme dark
            if(['light', 'dark', 'blue-dark', 'green-dark'].includes(themeName)) {
                setTheme(themeName);
                printLine(`Theme changed to ${themeName}`);
            } else {
                printLine("Error: Theme not found. Use: light, dark, blue-dark, green-dark");
            }
            break;

        case 'df': // Disk Free (ala Linux)
            const infoRes = await fetch(`${GAS_URL}?action=GET_DRIVE_INFO`);
            const info = await infoRes.json();
            const used = (info.used / (1024**3)).toFixed(2);
            const total = (info.limit / (1024**3)).toFixed(2);
            printLine(`Drive Usage: ${used}GB / ${total}GB (${Math.round((info.used/info.limit)*100)}%)`);
            break;

        case 'neofetch': // Gaya Linux buat pamer spek OS
            printLine(`
                <span style="color:var(--accent)"><b>GitHub-OS v1.0</b></span><br>
                ------------------<br>
                <b>OS:</b> Cloud Desktop Environment<br>
                <b>Host:</b> GitHub Pages<br>
                <b>Kernel:</b> Google Apps Script API<br>
                <b>Shell:</b> Custom JS Terminal<br>
                <b>Theme:</b> ${document.documentElement.getAttribute('data-theme') || 'default'}<br>
                <b>User:</b> root@drive
            `);
            break;

    }
}


</script>

</body>
</html>
